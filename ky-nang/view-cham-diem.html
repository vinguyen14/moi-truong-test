<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm & Lưu Trữ (Giảng Viên)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        /* CSS IN PDF CHO GIẢNG VIÊN */
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; padding: 0; background: white; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div>
                <h1 class="text-2xl font-black text-indigo-700">PORTAL CHẤM ĐIỂM & LƯU TRỮ</h1>
                <p class="text-sm text-slate-500 font-medium">Quản lý bài nộp Khóa Kỹ năng KiotViet</p>
            </div>
            <button onclick="loadSubmissions()" id="btnRefresh" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-2">
                <i class="fas fa-sync-alt"></i> Làm mới
            </button>
        </div>

        <!-- INPUT API URL -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Đường link API (GAS):</label>
            <input type="text" id="inpApi" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:border-indigo-400 focus:outline-none" placeholder="Dán link API (đuôi /exec) vào đây...">
        </div>

        <!-- LOADING SPINNER -->
        <div id="loading" class="text-center py-10 hidden">
            <i class="fas fa-spinner fa-spin text-4xl text-indigo-500 mb-4"></i>
            <p class="font-bold text-slate-500">Đang tải danh sách bài nộp...</p>
        </div>

        <!-- LIST CONTAINER -->
        <div id="submissionsList" class="space-y-6"></div>
    </div>

    <!-- KHUNG ẨN ĐỂ IN PDF -->
    <div id="printArea" class="hidden"></div>

    <script>
        let allData = [];

        // 1. TẢI DỮ LIỆU TỪ GOOGLE SHEET (API)
        function loadSubmissions() {
            const apiUrl = document.getElementById('inpApi').value.trim();
            if(!apiUrl) { alert("Vui lòng dán link API vào ô trống trước!"); return; }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('submissionsList').innerHTML = '';
            document.getElementById('btnRefresh').disabled = true;

            fetch(apiUrl + '?action=get_all_submissions')
            .then(r => r.json())
            .then(res => {
                if(res.status === 'success') {
                    allData = res.data;
                    renderList(allData);
                } else alert("Lỗi tải dữ liệu!");
            }).catch(err => alert("Lỗi kết nối!")).finally(() => { 
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btnRefresh').disabled = false;
            });
        }

        // 2. RENDER DANH SÁCH BÀI LÀM
        function renderList(data) {
            const container = document.getElementById('submissionsList');
            if(data.length === 0) { 
                container.innerHTML = `<p class="text-center text-slate-500 font-bold py-10">Chưa có học viên nào nộp bài.</p>`; 
                return; 
            }

            data.forEach((item, index) => {
                let isGraded = item.feedback && item.feedback.trim() !== "";
                let isUpdate = item.exerciseTitle.includes("[BẢN BỔ SUNG]");
                
                // Badges hiển thị trạng thái
                let gradeBadge = isGraded 
                    ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-check"></i> Đã chấm</span>` 
                    : `<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-xs font-black"><i class="fas fa-exclamation-circle"></i> Chờ chấm</span>`;
                
                let updateBadge = isUpdate 
                    ? `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider animate-pulse border border-red-200"><i class="fas fa-history"></i> Bổ sung</span>` 
                    : `<span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider"><i class="fas fa-file-alt"></i> Nộp Lần 1</span>`;

                let html = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <!-- Thanh tiêu đề bài tập (Bấm vào để xổ ra) -->
                    <div class="bg-slate-50 p-5 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100 transition" onclick="document.getElementById('body_${index}').classList.toggle('hidden')">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="text-lg font-black text-indigo-800">${item.studentName} <span class="text-sm text-slate-500 font-medium">(${item.department})</span></h3>
                                ${updateBadge}
                            </div>
                            <p class="text-xs font-bold text-slate-400">Nộp lúc: ${item.timestamp} | Tình huống: <span class="text-indigo-600">${item.exerciseTitle}</span></p>
                        </div>
                        <div class="flex items-center gap-4">${gradeBadge} <i class="fas fa-chevron-down text-slate-400"></i></div>
                    </div>
                    
                    <!-- Nội dung bài làm -->
                    <div id="body_${index}" class="hidden p-6">
                        <!-- Nút Đóng gói PDF -->
                        <div class="flex justify-end mb-4">
                            <button onclick="exportToPDF(${index})" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 shadow-md transition">
                                <i class="fas fa-file-pdf text-red-400"></i> Đóng gói & Xuất PDF
                            </button>
                        </div>

                        <!-- 5 Bước Kịch Bản -->
                        <div class="space-y-4 mb-6">
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-xs font-black text-slate-500 mb-2">BƯỚC 1: TIẾP CẬN</p><p class="text-sm font-medium whitespace-pre-wrap">${item.ans1 || '(Trống)'}</p></div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-xs font-black text-slate-500 mb-2">BƯỚC 2: XÁC THỰC</p><p class="text-sm font-medium whitespace-pre-wrap">${item.ans2 || '(Trống)'}</p></div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-xs font-black text-slate-500 mb-2">BƯỚC 3: KHAI THÁC</p><p class="text-sm font-medium whitespace-pre-wrap">${item.ans3 || '(Trống)'}</p></div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-xs font-black text-slate-500 mb-2">BƯỚC 4: TƯ VẤN</p><p class="text-sm font-medium whitespace-pre-wrap">${item.ans4 || '(Trống)'}</p></div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200"><p class="text-xs font-black text-slate-500 mb-2">BƯỚC 5: CHỐT</p><p class="text-sm font-medium whitespace-pre-wrap">${item.ans5 || '(Trống)'}</p></div>
                        </div>

                        <!-- Link Google Docs & Ảnh Drive -->
                        ${item.links ? `<div class="mb-6"><p class="text-xs font-black text-slate-500 mb-2">FILE GOOGLE DOCS (BACKUP) & ẢNH ĐÍNH KÈM TỪ DRIVE:</p><div class="bg-blue-50 p-3 rounded-lg border border-blue-100 flex flex-col gap-2">${item.links.split('\n').map(link => `<a href="${link}" target="_blank" class="text-sm text-blue-600 hover:text-blue-800 underline break-all font-medium"><i class="fas fa-external-link-alt mr-1"></i> ${link}</a>`).join('')}</div></div>` : ''}

                        <!-- Khung Nhập Feedback -->
                        <div class="bg-amber-50 p-5 rounded-xl border border-amber-200">
                            <label class="block text-xs font-black text-amber-800 uppercase mb-2"><i class="fas fa-pen"></i> Ghi nhận xét của bạn vào đây:</label>
                            <textarea id="fb_${index}" rows="4" class="w-full p-4 rounded-lg border border-amber-300 outline-none text-sm font-medium mb-3 focus:ring-2 focus:ring-amber-400">${item.feedback || ''}</textarea>
                            <button id="btnSend_${index}" onclick="sendFeedback(${index}, '${item.studentName}', '${item.exerciseTitle}')" class="bg-amber-500 hover:bg-amber-600 text-white font-black px-6 py-2.5 rounded-lg shadow-md transition">
                                <i class="fas fa-paper-plane"></i> LƯU VÀ GỬI NHẬN XÉT
                            </button>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        }

        // 3. XUẤT PDF BÀI LÀM
        function exportToPDF(index) {
            const item = allData[index];
            const printArea = document.getElementById('printArea');
            
            let printHtml = `
            <div style="font-family: Arial, sans-serif; color: #333; max-width: 800px; margin: 0 auto; padding: 20px;">
                <div style="text-align: center; border-bottom: 2px solid #4f46e5; margin-bottom: 30px; padding-bottom: 20px;">
                    <h1 style="font-size: 26px; font-weight: 900; color: #1e3a8a; margin: 0 0 10px 0;">BÁO CÁO LƯU TRỮ KỊCH BẢN</h1>
                    <p style="font-size: 14px; color: #64748b; margin: 0;">Xuất từ Portal Giảng Viên KiotViet</p>
                </div>
                
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                    <table style="width: 100%; font-size: 14px; line-height: 1.8;">
                        <tr><td style="width: 120px; font-weight: bold; color: #64748b;">Học viên:</td><td style="font-weight: bold; color: #0f172a;">${item.studentName}</td></tr>
                        <tr><td style="font-weight: bold; color: #64748b;">Phòng ban:</td><td style="font-weight: bold; color: #0f172a;">${item.department}</td></tr>
                        <tr><td style="font-weight: bold; color: #64748b;">Tình huống:</td><td style="font-weight: bold; color: #4f46e5;">${item.exerciseTitle}</td></tr>
                        <tr><td style="font-weight: bold; color: #64748b;">Thời gian nộp:</td><td>${item.timestamp}</td></tr>
                    </table>
                </div>

                <div style="margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 8px 15px; font-size: 13px; font-weight: bold; color: #312e81; margin-bottom: 8px; border-left: 4px solid #4f46e5;">BƯỚC 1: TIẾP CẬN</div>
                    <div style="padding: 0 15px 15px 15px; font-size: 14px; white-space: pre-wrap; color: #334155; line-height: 1.6;">${item.ans1 || '(Trống)'}</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 8px 15px; font-size: 13px; font-weight: bold; color: #312e81; margin-bottom: 8px; border-left: 4px solid #4f46e5;">BƯỚC 2: XÁC THỰC</div>
                    <div style="padding: 0 15px 15px 15px; font-size: 14px; white-space: pre-wrap; color: #334155; line-height: 1.6;">${item.ans2 || '(Trống)'}</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 8px 15px; font-size: 13px; font-weight: bold; color: #312e81; margin-bottom: 8px; border-left: 4px solid #4f46e5;">BƯỚC 3: KHAI THÁC</div>
                    <div style="padding: 0 15px 15px 15px; font-size: 14px; white-space: pre-wrap; color: #334155; line-height: 1.6;">${item.ans3 || '(Trống)'}</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 8px 15px; font-size: 13px; font-weight: bold; color: #312e81; margin-bottom: 8px; border-left: 4px solid #4f46e5;">BƯỚC 4: TƯ VẤN</div>
                    <div style="padding: 0 15px 15px 15px; font-size: 14px; white-space: pre-wrap; color: #334155; line-height: 1.6;">${item.ans4 || '(Trống)'}</div>
                </div>
                <div style="margin-bottom: 20px;">
                    <div style="background: #eef2ff; padding: 8px 15px; font-size: 13px; font-weight: bold; color: #312e81; margin-bottom: 8px; border-left: 4px solid #4f46e5;">BƯỚC 5: CHỐT</div>
                    <div style="padding: 0 15px 15px 15px; font-size: 14px; white-space: pre-wrap; color: #334155; line-height: 1.6;">${item.ans5 || '(Trống)'}</div>
                </div>
                
                ${item.feedback ? `<div style="background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; padding: 15px; margin-top: 20px; page-break-inside: avoid;"><p style="font-weight: bold; font-size: 14px; margin: 0 0 8px 0; color: #b45309;">💬 Giảng viên nhận xét:</p><p style="font-size: 14px; color: #78350f; white-space: pre-wrap; margin: 0; line-height: 1.6;">${item.feedback}</p></div>` : ''}
            </div>`;
            
            printArea.innerHTML = printHtml;
            printArea.classList.remove('hidden');
            window.print();
            printArea.classList.add('hidden');
        }

        // 4. GỬI NHẬN XÉT LÊN API
        function sendFeedback(index, stName, exTitle) {
            const apiUrl = document.getElementById('inpApi').value.trim();
            const val = document.getElementById(`fb_${index}`).value;
            if(!val) { alert("Vui lòng gõ nhận xét trước khi gửi!"); return; }

            const btn = document.getElementById(`btnSend_${index}`);
            const oldText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang gửi...`; 
            btn.disabled = true;

            const payload = { action: "update_feedback", studentName: stName, exerciseTitle: exTitle, feedback: val };

            fetch(apiUrl, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=utf-8'}, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') { 
                    alert("Đã gửi nhận xét thành công! Học viên sẽ thấy cập nhật ngay lập tức."); 
                    loadSubmissions(); // Load lại list để cập nhật Badge "Đã chấm"
                } else {
                    alert("Lỗi: " + res.message);
                }
            }).catch(err => alert("Lỗi kết nối mạng!")).finally(() => { 
                btn.innerHTML = oldText; 
                btn.disabled = false; 
            });
        }
    </script>
</body>
</html>
