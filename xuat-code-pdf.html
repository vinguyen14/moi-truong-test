<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer OS - Pro Preview & Print Emulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-hover': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        /* Class chuẩn hệ thống */
        .saas-card {
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        
        /* Nền caro mô phỏng bàn làm việc (Canvas) */
        .canvas-bg {
            background-color: #e2e8f0;
            background-image: 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1), 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* Iframe bọc trong wrapper để xử lý Zoom */
        #iframe-wrapper {
            transform-origin: center center;
            transition: transform 0.2s ease-out;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: white;
        }
        #slide-preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        /* Custom scrollbar cho textarea */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-primary text-white p-2 rounded shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900">Device Simulator & Dynamic Print</h1>
                <p class="text-sm text-slate-500">Giả lập hiển thị và Ghi đè cấu hình in (Override Print)</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="renderHTML()" class="btn-secondary flex items-center gap-2" title="Ctrl + Enter để xem nhanh">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Làm mới (Render)
            </button>
            <button onclick="exportToPDF()" class="btn-primary flex items-center gap-2 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                In PDF Theo Khổ Giả Lập
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-1 p-6 flex gap-6 overflow-hidden">
        
        <!-- Cột trái: Nhập HTML -->
        <div class="w-1/3 flex flex-col gap-2 relative h-full">
            <label for="html-input" class="font-semibold text-slate-700 flex justify-between items-center">
                Mã nguồn HTML / CSS
                <span id="save-status" class="text-xs font-normal text-emerald-600 bg-emerald-50 px-2 py-1 rounded hidden transition-all border border-emerald-200">Đã lưu nháp!</span>
            </label>
            <textarea id="html-input" class="saas-card w-full flex-1 p-4 font-mono text-[13px] text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none leading-relaxed" placeholder="Dán toàn bộ mã HTML của bạn vào đây..."></textarea>
        </div>

        <!-- Cột phải: Khung xem trước & Giả lập -->
        <div class="w-2/3 flex flex-col gap-2 h-full">
            
            <!-- Toolbar kích thước -->
            <div class="flex justify-between items-center bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm shrink-0">
                <div class="flex items-center gap-3">
                    <label class="text-sm font-semibold text-slate-700">Kích thước giả lập:</label>
                    <select id="canvas-size" class="text-sm border border-slate-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-primary text-slate-700 font-medium" onchange="updateScale()">
                        <option value="responsive">🌐 Tự do (Vừa vặn khung)</option>
                        <optgroup label="Bản Trình Bày (Desktop)">
                            <option value="1920x1080">🖥️ Desktop / Slide 16:9 (1920x1080)</option>
                            <option value="1366x768">💻 Laptop Nhỏ (1366x768)</option>
                        </optgroup>
                        <optgroup label="Khổ Giấy In (Print)">
                            <option value="1123x794" selected>📄 Giấy A4 - Nằm Ngang (1123x794)</option>
                            <option value="794x1123">📄 Giấy A4 - Nằm Dọc (794x1123)</option>
                        </optgroup>
                        <optgroup label="Thiết bị di động">
                            <option value="768x1024">📱 Tablet (768x1024)</option>
                            <option value="375x812">📱 Mobile iPhone (375x812)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded border border-slate-200" id="zoom-level">Scale: 100%</span>
                </div>
            </div>

            <!-- Khu vực mặt bàn Canvas -->
            <div id="preview-container" class="saas-card flex-1 canvas-bg overflow-hidden flex items-center justify-center relative rounded-lg border border-slate-300 inset-shadow">
                
                <!-- Wrapper xử lý Scale -->
                <div id="iframe-wrapper">
                    <!-- Khung Iframe độc lập -->
                    <iframe id="slide-preview-frame"></iframe>
                </div>
                
            </div>
        </div>

    </main>

    <script>
        const LOCAL_STORAGE_KEY = 'kv_slide_builder_draft';
        const htmlInput = document.getElementById('html-input');
        const saveStatus = document.getElementById('save-status');

        // Logic Xử lý Kích thước và Tỉ lệ Zoom
        function updateScale() {
            const size = document.getElementById('canvas-size').value;
            const container = document.getElementById('preview-container');
            const wrapper = document.getElementById('iframe-wrapper');
            const zoomLabel = document.getElementById('zoom-level');
            
            if (!container || !wrapper) return;

            if (size === 'responsive') {
                wrapper.style.width = '100%';
                wrapper.style.height = '100%';
                wrapper.style.transform = 'scale(1)';
                zoomLabel.innerText = 'Scale: Khớp';
            } else {
                const [w, h] = size.split('x').map(Number);
                wrapper.style.width = w + 'px';
                wrapper.style.height = h + 'px';
                
                const padding = 64; 
                const availableWidth = container.clientWidth - padding;
                const availableHeight = container.clientHeight - padding;
                
                const scaleW = availableWidth / w;
                const scaleH = availableHeight / h;
                
                const scale = Math.min(scaleW, scaleH, 1);
                
                wrapper.style.transform = `scale(${scale})`;
                zoomLabel.innerText = `Scale: ${Math.round(scale * 100)}%`;
            }
        }

        window.addEventListener('resize', updateScale);

        window.addEventListener('DOMContentLoaded', () => {
            const savedCode = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedCode) {
                htmlInput.value = savedCode;
                renderHTML();
            } else {
                renderDefaultInstruction();
            }
            setTimeout(updateScale, 100); 
        });

        let typingTimer;
        htmlInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                localStorage.setItem(LOCAL_STORAGE_KEY, htmlInput.value);
                saveStatus.classList.remove('hidden');
                setTimeout(() => saveStatus.classList.add('hidden'), 2000);
            }, 1000);
        });

        htmlInput.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                renderHTML();
            }
        });

        function renderHTML() {
            const codeInput = htmlInput.value;
            const iframe = document.getElementById('slide-preview-frame');
            
            if (!codeInput.trim()) {
                alert("Vui lòng nhập mã HTML.");
                renderDefaultInstruction();
                return;
            }
            
            const iframeDoc = iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(codeInput);
            iframeDoc.close();
            
            updateScale();
        }

        function renderDefaultInstruction() {
            const iframe = document.getElementById('slide-preview-frame');
            const iframeDoc = iframe.contentWindow.document;
            const instructionHTML = `
                <html lang="vi">
                <body style="font-family: sans-serif; display: flex; flex-direction: column; height: 100%; margin: 0; align-items: center; justify-content: center; background-color: #ffffff; color: #94a3b8; text-align: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="height: 64px; width: 64px; margin-bottom: 16px; color: #cbd5e1;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p style="font-size: 1.125rem;">Khu vực Xem Trước & Giả Lập</p>
                </body>
                </html>
            `;
            iframeDoc.open();
            iframeDoc.write(instructionHTML);
            iframeDoc.close();
        }

        // ==========================================
        // LÕI XỬ LÝ CSS OVERRIDE KHI IN (DYNAMIC PRINT)
        // ==========================================
        function exportToPDF() {
            const codeInput = htmlInput.value;
            const sizeSelect = document.getElementById('canvas-size').value;
            
            if (!codeInput.trim()) {
                alert("Không có dữ liệu để in.");
                return;
            }

            const newWindow = window.open('', '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert("Vui lòng cho phép mở Pop-up để hệ thống chạy tính năng in.");
                return;
            }

            // Tiêm CSS mạnh nhất (!important) để đánh bại các hardcode của file gốc
            let printOverrideCSS = '';
            if (sizeSelect !== 'responsive') {
                const [w, h] = sizeSelect.split('x').map(Number);
                // Xác định in dọc hay ngang dựa trên kích thước bạn đang chọn
                const orientation = w > h ? 'landscape' : 'portrait';

                printOverrideCSS = `
                <!-- DEV INJECTION: OVERRIDE PRINT SETTINGS CHO GIẢ LẬP -->
                <style>
                    @media print {
                        /* 1. Ép hướng tờ giấy A4 */
                        @page {
                            size: A4 ${orientation} !important;
                            margin: 0 !important;
                        }
                        
                        /* 2. Ép tờ giấy in có nền màu xám nhạt để làm nổi bật thiết bị ảo */
                        html, body {
                            width: 100% !important;
                            height: auto !important;
                            background-color: #e2e8f0 !important; 
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                            margin: 0 !important;
                            padding: 10mm 0 !important;
                        }

                        /* 3. Ép chiều rộng và canh giữa (Đánh bại max-w-5xl, slide-card cũ) */
                        .w-full.max-w-5xl, .slide-card, body > div {
                            width: ${w}px !important;
                            max-width: ${w}px !important;
                            margin-left: auto !important;
                            margin-right: auto !important;
                        }

                        /* 4. Định hình lại các thẻ nội dung (bo góc, đổ bóng giống điện thoại/tablet đặt trên giấy) */
                        .slide-card {
                            height: auto !important;
                            min-height: ${h}px !important;
                            margin-bottom: 15mm !important;
                            border: 1px solid #cbd5e1 !important;
                            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
                            border-radius: 12px !important;
                            overflow: hidden !important;
                            /* Reset ngắt trang nếu cần */
                            page-break-inside: avoid !important;
                        }
                    }
                </style>`;
            }

            // Nối đoạn CSS override vào dòng cuối cùng của code để nắm quyền kiểm soát cao nhất
            const finalHTML = codeInput + printOverrideCSS;

            newWindow.document.open();
            newWindow.document.write(finalHTML);
            newWindow.document.close();

            // Đợi 1.5s load CSS rồi in
            setTimeout(() => {
                newWindow.focus();
                newWindow.print();
            }, 1500);
        }
    </script>
</body>
</html>
