<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Trạm Chấm Bài</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tùy chỉnh Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex overflow-hidden">

    <!-- SIDEBAR QUẢN TRỊ -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full hidden md:flex z-20">
        <div class="p-6 flex items-center border-b border-slate-800">
            <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center mr-3 font-bold">T</div>
            <h1 class="text-lg font-bold tracking-wide">Teacher OS</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 bg-indigo-600 text-white rounded-lg transition-colors">
                <i class="fa-solid fa-inbox w-6"></i>
                <span class="text-sm font-medium">Chấm bài tập</span>
            </a>
            <a href="#" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-chart-pie w-6"></i>
                <span class="text-sm font-medium">Báo cáo (Demo)</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800 text-sm text-slate-500 flex items-center">
            <div class="w-8 h-8 bg-slate-700 rounded-full flex items-center justify-center mr-3"><i class="fa-solid fa-user"></i></div>
            <span>Giảng viên</span>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 overflow-hidden relative">
        
        <!-- Header -->
        <header class="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-6 shrink-0">
            <h2 class="text-lg font-bold text-slate-800">Danh sách Bài nộp</h2>
            <button onclick="loadData()" class="text-sm bg-white border border-slate-300 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                <i class="fa-solid fa-rotate-right mr-2"></i>Làm mới
            </button>
        </header>

        <!-- Khung chứa nội dung chính -->
        <div class="flex-1 overflow-y-auto p-6 scroll-smooth">
            
            <!-- THỐNG KÊ NHANH -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl mr-4"><i class="fa-solid fa-layer-group"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Tổng bài nộp</p><h3 id="stat-total" class="text-2xl font-bold text-slate-800">0</h3></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                    <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center text-xl mr-4"><i class="fa-solid fa-clock"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Chờ chấm</p><h3 id="stat-pending" class="text-2xl font-bold text-slate-800">0</h3></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-xl mr-4"><i class="fa-solid fa-check-double"></i></div>
                    <div><p class="text-sm text-slate-500 font-medium">Đã chấm</p><h3 id="stat-graded" class="text-2xl font-bold text-slate-800">0</h3></div>
                </div>
            </div>

            <!-- BẢNG DỮ LIỆU -->
            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 tracking-wider">
                                <th class="p-4 font-semibold">Học viên</th>
                                <th class="p-4 font-semibold">Thời gian nộp</th>
                                <th class="p-4 font-semibold">Link bài tập</th>
                                <th class="p-4 font-semibold">Trạng thái</th>
                                <th class="p-4 font-semibold">Điểm số</th>
                                <th class="p-4 font-semibold text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm text-slate-700 divide-y divide-slate-100">
                            <!-- Loading State -->
                            <tr id="row-loading">
                                <td colspan="6" class="p-8 text-center text-slate-400">
                                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-indigo-500"></i>
                                    <p>Đang tải dữ liệu từ Google Sheet...</p>
                                </td>
                            </tr>
                            <!-- Dữ liệu sẽ được đẩy vào đây bằng JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL CHẤM ĐIỂM (Ẩn mặc định) -->
    <div id="grade-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 transform scale-95 transition-transform duration-300" id="grade-modal-content">
            
            <div class="flex justify-between items-center p-5 border-b border-slate-100">
                <h3 class="text-lg font-bold text-slate-800">Chấm điểm bài tập</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-5 space-y-4">
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-100 flex items-center justify-between">
                    <span class="text-sm text-slate-500">Học viên:</span>
                    <span id="modal-student-name" class="font-bold text-indigo-700">Nguyễn Văn A</span>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Điểm số (Thang 10)</label>
                    <input type="number" id="input-score" min="0" max="10" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="VD: 9.5">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Lời phê / Nhận xét</label>
                    <textarea id="input-feedback" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Nhận xét ưu/nhược điểm..."></textarea>
                </div>
            </div>
            
            <div class="p-5 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 rounded-b-2xl">
                <button onclick="closeModal()" class="px-5 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">Hủy</button>
                <button id="btn-save-grade" onclick="submitGrade()" class="px-5 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 flex items-center">
                    <i class="fa-solid fa-check mr-2" id="icon-save"></i><span id="text-save">Lưu điểm</span>
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIC XỬ LÝ (JAVASCRIPT) -->
    <script>
        // 🛑 QUAN TRỌNG: Dán link Web App (Google Apps Script) của bạn vào đây (Dùng chung link với form học viên)
        const API_URL = "ĐIỀN_LINK_CỦA_BẠN_VÀO_ĐÂY";

        // Biến toàn cục để nhớ xem đang chấm điểm cho ID nào
        let currentGradingId = null;

        // 1. Khi vừa mở web, tự động tải dữ liệu
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // 2. Hàm Tải dữ liệu từ GAS
        function loadData() {
            const tableBody = document.getElementById('table-body');
            
            // Hiện trạng thái Loading
            tableBody.innerHTML = `
                <tr id="row-loading">
                    <td colspan="6" class="p-8 text-center text-slate-400">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-indigo-500"></i>
                        <p>Đang tải dữ liệu từ Google Sheet...</p>
                    </td>
                </tr>
            `;

            // Gọi API
            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'get_list' })
            })
            .then(res => res.json())
            .then(response => {
                if(response.status === 'success') {
                    renderTable(response.data);
                } else {
                    tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Lỗi: ${response.message}</td></tr>`;
                }
            })
            .catch(err => {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">Lỗi kết nối mạng!</td></tr>`;
            });
        }

        // 3. Hàm Vẽ dữ liệu ra Bảng HTML
        function renderTable(dataList) {
            const tableBody = document.getElementById('table-body');
            
            if(!dataList || dataList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-400">Chưa có bài nộp nào.</td></tr>`;
                return;
            }

            let html = '';
            let countPending = 0;
            let countGraded = 0;

            // Đảo ngược mảng để bài nộp mới nhất lên đầu
            const reversedData = [...dataList].reverse();

            reversedData.forEach(item => {
                // Thống kê
                if(item.status === 'Chờ chấm') countPending++;
                else countGraded++;

                // Format trạng thái UI
                const statusBadge = item.status === 'Chờ chấm' 
                    ? `<span class="bg-amber-100 text-amber-700 px-2.5 py-1 rounded-md text-xs font-semibold">Chờ chấm</span>`
                    : `<span class="bg-green-100 text-green-700 px-2.5 py-1 rounded-md text-xs font-semibold">Đã chấm</span>`;
                
                // Format nút bấm UI
                const actionButton = item.status === 'Chờ chấm'
                    ? `<button onclick="openModal('${item.id}', '${item.student_name}')" class="text-sm font-semibold text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors border border-indigo-200">Chấm ngay</button>`
                    : `<button onclick="openModal('${item.id}', '${item.student_name}')" class="text-sm font-semibold text-slate-500 hover:bg-slate-100 px-3 py-1.5 rounded-lg transition-colors border border-slate-200"><i class="fa-solid fa-pen mr-1"></i>Sửa điểm</button>`;

                // Format Ngày giờ
                const dateObj = new Date(item.timestamp);
                const timeStr = dateObj.toLocaleDateString('vi-VN') + ' ' + dateObj.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});

                html += `
                    <tr class="hover:bg-slate-50 transition-colors group">
                        <td class="p-4 font-medium text-slate-800">
                            <div class="flex items-center">
                                <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center mr-3 font-bold text-xs">${item.student_name.charAt(0)}</div>
                                ${item.student_name}
                            </div>
                        </td>
                        <td class="p-4 text-slate-500 text-xs">${timeStr}</td>
                        <td class="p-4"><a href="${item.project_link}" target="_blank" class="text-blue-600 hover:underline text-sm"><i class="fa-solid fa-arrow-up-right-from-square mr-1"></i>Xem dự án</a></td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 font-bold ${item.score ? 'text-slate-800' : 'text-slate-300'}">${item.score || '-'}</td>
                        <td class="p-4 text-right">${actionButton}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;

            // Cập nhật thẻ thống kê
            document.getElementById('stat-total').innerText = dataList.length;
            document.getElementById('stat-pending').innerText = countPending;
            document.getElementById('stat-graded').innerText = countGraded;
        }

        // 4. Các hàm xử lý Cửa sổ Popup (Modal)
        function openModal(id, studentName) {
            currentGradingId = id; // Nhớ ID bài đang chấm
            document.getElementById('modal-student-name').innerText = studentName;
            document.getElementById('input-score').value = '';
            document.getElementById('input-feedback').value = '';
            
            const modal = document.getElementById('grade-modal');
            const content = document.getElementById('grade-modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('grade-modal');
            const content = document.getElementById('grade-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                currentGradingId = null;
            }, 300);
        }

        // 5. Hàm Gửi điểm lên máy chủ
        function submitGrade() {
            const score = document.getElementById('input-score').value;
            const feedback = document.getElementById('input-feedback').value;

            if(!score) {
                alert("Vui lòng nhập điểm số!");
                return;
            }

            // Giao diện loading nút bấm
            const btn = document.getElementById('btn-save-grade');
            btn.disabled = true;
            document.getElementById('icon-save').className = "fa-solid fa-spinner fa-spin mr-2";
            document.getElementById('text-save').innerText = "Đang lưu...";

            const payload = {
                action: "grade",
                id: currentGradingId,
                score: score,
                feedback: feedback
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    closeModal();
                    loadData(); // Tải lại bảng để cập nhật màu xanh (Đã chấm)
                } else {
                    alert("Lỗi: " + data.message);
                }
            })
            .finally(() => {
                // Trả lại trạng thái nút bấm ban đầu
                btn.disabled = false;
                document.getElementById('icon-save').className = "fa-solid fa-check mr-2";
                document.getElementById('text-save').innerText = "Lưu điểm";
            });
        }
    </script>
</body>
</html>
