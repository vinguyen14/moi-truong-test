<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 2 - Thực hành KiotViet</title>
    <!-- Thêm Font Roboto chuẩn Google -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 10px; }
        
        /* Cấu trúc step Circle Sidebar */
        .step-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 16px; border: 1px solid transparent; border-left: none;}
        
        /* Trạng thái chưa chọn */
        .step-inactive { color: #5f6368; border-color: #dadce0; background: white;}
        .step-inactive:hover { background: #f1f3f4; }
        .step-inactive .step-circle { background: #7f8c8d; color: white; }
        
        /* Trạng thái đang chọn (Active) */
        .step-active { background-color: #e8f0fe; color: #1a73e8; font-weight: 500; border-color: #d2e3fc;}
        .step-active .step-circle { background: #1a73e8; color: white; font-weight: bold; }

        .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px;}
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">
<!-- THẺ XÁC NHẬN HOÀN THÀNH (ĐỂ HỌC VIÊN CHỤP ẢNH GỬI ZALO) -->
    <div id="certificateModal" class="fixed inset-0 bg-gray-900 bg-opacity-90 z-[100] flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4 text-center relative border-4 border-yellow-400">
            <h2 class="text-3xl font-bold text-gray-800 mb-2 uppercase">Xác Nhận Hoàn Thành</h2>
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <p class="text-gray-600 mb-4 text-lg">Chúc mừng bạn đã hoàn thành xuất sắc bài tập!</p>
            
            <div class="bg-gray-50 border border-gray-200 rounded p-4 text-left space-y-2 mb-6">
                <p><strong>👤 Họ và tên:</strong> <span id="certName" class="text-blue-700"></span></p>
                <p><strong>🏢 Phòng ban:</strong> <span id="certDept" class="text-blue-700"></span></p>
                <p><strong>📚 Bài học:</strong> <span id="certSession"></span></p>
                <p><strong>💯 Tiến độ:</strong> <span class="text-green-600 font-bold">100% (Đã nộp toàn bộ)</span></p>
                <p><strong>⏰ Thời gian:</strong> <span id="certTime" class="text-red-500 font-bold"></span></p>
            </div>
            
            <p class="text-sm font-bold text-red-600 mb-6 bg-red-50 p-2 rounded">
                YÊU CẦU: HÃY CHỤP ẢNH MÀN HÌNH NÀY VÀ GỬI VÀO NHÓM ZALO TRƯỚC 16:00
            </p>
            
            <button onclick="window.location.href='index.html'" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                Trở về Trang chủ
            </button>
        </div>
    </div>
    <!-- HEADER CHUẨN GOOGLE -->
    <header class="bg-white border-b border-gray-200 z-20 flex flex-col shadow-sm">
        <div class="flex items-center justify-between px-6 py-3">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-2 text-gray-600 hover:text-blue-600 font-medium transition text-sm border border-gray-300 px-4 py-1.5 rounded-md hover:bg-gray-50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Quay lại
                </a>
                <div class="font-normal text-lg text-gray-700 pl-4 border-l border-gray-300" id="sessionTitle">Đang tải...</div>
            </div>
            <div class="flex items-center gap-3 text-sm font-medium text-gray-600 bg-gray-100 px-4 py-1.5 rounded border border-gray-200">
                <span id="studentLabel" class="text-[#1a73e8] border-r border-gray-300 pr-3 font-medium">👤 Chưa định danh</span>
                <span id="timeRemaining">Tiến độ: 0%</span>
            </div>
        </div>
        <!-- Progress Bar Mỏng -->
        <div class="w-full bg-gray-200 h-1"><div id="progressBar" class="bg-[#1a73e8] h-1 transition-all duration-300" style="width: 0%"></div></div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-80 overflow-y-auto custom-scrollbar flex-shrink-0 hidden md:block pt-6">
            <ul id="stepList" class="flex flex-col gap-2"></ul>
        </aside>

        <!-- MAIN CONTENT (Khung trắng nổi) -->
        <main class="flex-1 overflow-y-auto custom-scrollbar relative p-6">
            <div id="mainContent" class="max-w-4xl mx-auto bg-white border border-gray-200 rounded-lg shadow-sm p-10 mb-24">
                <!-- Data Rendered Here -->
            </div>
            
            <!-- BOTTOM BAR -->
            <div class="fixed bottom-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-between items-center md:w-[calc(100%-20rem)] w-full">
                <button id="btnPrev" onclick="prevStep()" class="flex items-center gap-2 px-5 py-2 text-gray-600 font-medium hover:text-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Trở lại
                </button>
                <button id="btnNext" onclick="nextStep()" class="flex items-center gap-2 px-6 py-2.5 text-white bg-[#1a73e8] hover:bg-blue-700 rounded transition shadow">
                    Tiếp <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="codelab-data.js"></script>
    <script>
        // --- CHÚ Ý: SỬA ĐOẠN NÀY NẾU LÀ BUỔI 2, BUỔI 3 ---
        const SESSION_ID = 'session_2'; 
        const STORAGE_KEY = 'kv_codelab_progress_b2'; // Lưu vị trí step đang học
        const DATA_KEY = 'kv_codelab_data_b2'; // LƯU NHÁP CÂU TRẢ LỜI
        // -------------------------------------------------

        let currentStepIndex = 0;
        let currentExercises = [];
        let stepDataStore = {}; // Chứa { text: "", uploadedUrls: [] }

        document.addEventListener('DOMContentLoaded', () => {
            const savedState = localStorage.getItem(STORAGE_KEY);
            if(savedState) currentStepIndex = parseInt(savedState) || 0;
            
            const savedData = localStorage.getItem(DATA_KEY);
            if(savedData) stepDataStore = JSON.parse(savedData);
            
            const cName = APP_CONFIG.COURSE_NAME || 'Chưa định danh';
            const profileRaw = localStorage.getItem('kv_trainer_profile');
            if(profileRaw) {
                const profile = JSON.parse(profileRaw);
                document.getElementById('studentLabel').innerText = `👤 ${profile.name} - ${profile.dept}`;
            }

            loadSessionData();
        });

        function loadSessionData() {
            const session = CODELAB_DATA.find(s => s.id === SESSION_ID);
            if(!session) return;
            document.getElementById('sessionTitle').innerText = session.title;
            currentExercises = session.exercises;
            renderSidebar();
            goToStep(currentStepIndex);
        }

        function renderSidebar() {
            const listUl = document.getElementById('stepList');
            listUl.innerHTML = '';
            currentExercises.forEach((ex, index) => {
                const li = document.createElement('li');
                li.className = `step-item shadow-sm ${index === currentStepIndex ? 'step-active' : 'step-inactive'}`;
                li.onclick = () => goToStep(index);
                const shortTitle = ex.title.replace('BÀI TẬP ', '').replace('CĐ 1 - ', '').replace('CĐ 2 - ', '');
                
                // Thêm icon Checkmark nhỏ nếu bài này đã nộp
                const isSubmitted = stepDataStore[index] && stepDataStore[index].uploadedUrls && stepDataStore[index].uploadedUrls.length > 0;
                
                li.innerHTML = `
                    <div class="step-circle">${isSubmitted ? '✓' : (index + 1)}</div>
                    <div class="leading-snug text-[14px]">${shortTitle}</div>
                `;
                listUl.appendChild(li);
            });
        }

        function goToStep(index) {
            // Lưu text nháp của bước hiện tại TRƯỚC KHI chuyển sang bước mới
            saveDraft(); 

            if(index < 0 || index >= currentExercises.length) return;
            currentStepIndex = index;
            const ex = currentExercises[index];

            document.querySelectorAll('#stepList li').forEach((li, i) => {
                if(i === index) {
                    li.className = `step-item shadow-sm step-active`;
                    li.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else li.className = `step-item shadow-sm step-inactive`;
            });

            const contentDiv = document.getElementById('mainContent');
            let html = `<h1 class="text-3xl text-gray-800 mb-8 pb-4 border-b border-gray-200 font-normal">${ex.title}</h1>`;

            // Lấy data cũ nếu có
            const myData = stepDataStore[index] || { text: "", uploadedUrls: [] };

            // 1. CÂU HỎI LÝ THUYẾT + Ô NHẬP TEXT
            if(ex.theory && ex.theory.length > 0) {
                html += `<div class="mb-8">
                    <p class="mb-3 text-[#1a73e8] font-bold text-lg flex items-center gap-2">📝 Phần A: Câu hỏi lý thuyết</p>
                    <div class="bg-[#f1f3f4] p-5 rounded-lg text-gray-800 border border-gray-200 mb-4 space-y-2 text-[15px]">
                        ${ex.theory.map(t => `<p>${t}</p>`).join('')}
                    </div>
                    <textarea id="inpTextAnswer_${index}" rows="4" class="w-full border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-[#1a73e8] outline-none transition" placeholder="Gõ câu trả lời của bạn vào đây..." oninput="saveDraft()">${myData.text}</textarea>
                </div>`;
            }

            // 2. YÊU CẦU & HƯỚNG DẪN THỰC HÀNH
            if((ex.requirements && ex.requirements.length > 0) || (ex.instructions && ex.instructions.length > 0)) {
                html += `<p class="mb-3 text-[#1a73e8] font-bold text-lg flex items-center gap-2">💻 Phần B: Bài tập thực hành</p>`;
            }
            if(ex.requirements && ex.requirements.length > 0) {
                html += `<div class="mb-6"><p class="mb-2 text-gray-800 font-medium">Yêu cầu:</p>
                    <ul class="space-y-2 text-[15px] text-gray-700 pl-4 border-l-4 border-orange-400 bg-orange-50 py-3 pr-3 rounded-r-lg">
                        ${ex.requirements.map(r => `<li>${r}</li>`).join('')}
                    </ul></div>`;
            }
            if(ex.instructions && ex.instructions.length > 0) {
                html += `<div class="mb-8"><p class="mb-2 text-gray-800 font-medium">Hướng dẫn thao tác:</p>
                    <div class="bg-gray-50 p-5 rounded-lg font-mono text-[14px] text-gray-700 border border-gray-200 leading-relaxed space-y-3">
                        ${ex.instructions.map(i => `<p>${i}</p>`).join('')}
                    </div></div>`;
            }

            // 3. KHU VỰC NỘP BÀI TẬP (ẢNH + NÚT SUBMIT)
            let historyHtml = "";
            let btnText = "Nộp bài bước này";
            
            // Nếu đã từng nộp, hiển thị lịch sử
            if(myData.uploadedUrls.length > 0) {
                btnText = "Cập nhật / Nộp bổ sung";
                historyHtml = `<div class="bg-green-50 border border-green-200 p-4 rounded-lg mb-4 text-sm text-green-800">
                    <p class="font-bold flex items-center gap-1 mb-2">✅ Hệ thống đã ghi nhận bài làm của bạn</p>
                    <p>Các ảnh đã nộp:</p>
                    <ul class="list-disc pl-5 mt-1 text-blue-600 underline">
                        ${myData.uploadedUrls.map((url, i) => `<li><a href="${url}" target="_blank">Xem ảnh minh chứng ${i+1}</a></li>`).join('')}
                    </ul>
                </div>`;
            }

            html += `<div class="mt-8 border-t border-gray-200 pt-8">
                ${historyHtml}
                
                <p class="text-gray-800 font-medium mb-2">📸 Minh chứng thực hành (Tải ảnh lên):</p>
                <p class="text-gray-500 text-[13px] mb-4">${ex.confirm ? ex.confirm : 'Chọn một hoặc nhiều ảnh chụp màn hình.'}</p>
                
                <input type="file" id="inpFiles_${index}" multiple accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-[#1a73e8] hover:file:bg-blue-100 mb-6 cursor-pointer border border-gray-200 rounded-md p-1">
                
                <button id="btnSubmitStep_${index}" onclick="uploadToGAS(${index}, '${ex.title}')" class="w-full md:w-auto bg-[#1a73e8] text-white px-8 py-3 rounded-lg hover:bg-blue-700 transition shadow-md font-bold flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span id="btnSubmitText_${index}">${btnText}</span>
                </button>
            </div>`;

            contentDiv.innerHTML = html;
            updateBottomNav();
            document.querySelector('main').scrollTo(0, 0);
            
            // Lưu vị trí đang xem vào LocalStorage
            localStorage.setItem(STORAGE_KEY, currentStepIndex);
        }

        // HÀM LƯU NHÁP TEXT TỰ ĐỘNG
        function saveDraft() {
            const index = currentStepIndex;
            const textEl = document.getElementById(`inpTextAnswer_${index}`);
            if(!stepDataStore[index]) stepDataStore[index] = { text: "", uploadedUrls: [] };
            
            if(textEl) {
                stepDataStore[index].text = textEl.value;
                localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore));
            }
        }

        // HÀM NỘP BÀI LÊN BACKEND
        function uploadToGAS(index, exerciseTitle) {
            saveDraft(); 
            const fileInput = document.getElementById(`inpFiles_${index}`);
            const files = fileInput.files;
            const currentData = stepDataStore[index];
            
            if ((!currentData.text || currentData.text.trim() === "") && (!files || files.length === 0)) {
                alert("Vui lòng điền câu trả lời tự luận HOẶC chọn ảnh minh chứng để nộp bài!"); return;
            }

            const apiUrl = APP_CONFIG.API_URL;
            const courseName = APP_CONFIG.COURSE_NAME;
            if (!apiUrl || apiUrl === "") { alert("Lỗi: Chưa cấu hình API URL!"); return; }

            const profileRaw = localStorage.getItem('kv_trainer_profile');
            if (!profileRaw) {
                alert("Lỗi: Bạn chưa định danh. Hệ thống sẽ chuyển về trang chủ."); 
                window.location.href = 'index.html'; return;
            }
            const profile = JSON.parse(profileRaw);

            const btnEl = document.getElementById(`btnSubmitStep_${index}`);
            const txtEl = document.getElementById(`btnSubmitText_${index}`);
            const oldText = txtEl.innerText;
            
            btnEl.classList.replace('bg-[#1a73e8]', 'bg-gray-400');
            btnEl.classList.add('cursor-not-allowed', 'animate-pulse');
            txtEl.innerText = "Đang đẩy dữ liệu lên hệ thống...";
            btnEl.disabled = true;

            let promises = [];
            if(files && files.length > 0) {
                for(let i = 0; i < files.length; i++) {
                    promises.push(new Promise((resolve, reject) => {
                        let reader = new FileReader();
                        reader.onload = e => resolve({ mimeType: files[i].type, base64Data: e.target.result.split(',')[1] });
                        reader.onerror = e => reject(e);
                        reader.readAsDataURL(files[i]);
                    }));
                }
            }

            Promise.all(promises).then(imagesData => {
                const payload = {
                    studentName: profile.name, department: profile.dept,
                    courseName: courseName, session: document.getElementById('sessionTitle').innerText,
                    exerciseTitle: exerciseTitle, textAnswer: currentData.text, images: imagesData
                };
                return fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
            })
            .then(r => r.json())
            .then(data => {
                if(data.status === 'success') {
                    // ĐÁNH DẤU LÀ BÀI NÀY ĐÃ ĐƯỢC NỘP
                    currentData.isSubmitted = true;
                    if(data.urls && data.urls.length > 0) {
                        currentData.uploadedUrls = [...currentData.uploadedUrls, ...data.urls];
                    }
                    localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore));
                    
                    alert("🎉 Đã nộp bài thành công!");
                    goToStep(index); 
                    renderSidebar(); 
                } else alert("Lỗi server: " + data.message);
            })
            .catch(err => alert("Lỗi mạng: Xin thử lại."))
            .finally(() => {
                btnEl.classList.replace('bg-gray-400', 'bg-[#1a73e8]');
                btnEl.classList.remove('cursor-not-allowed', 'animate-pulse');
                txtEl.innerText = oldText;
                btnEl.disabled = false;
            });
        }

        // TÍNH TIẾN ĐỘ THỰC CHẤT
        function updateBottomNav() {
            const btnNext = document.getElementById('btnNext');
            document.getElementById('btnPrev').disabled = (currentStepIndex === 0);
            
            const total = currentExercises.length;
            let completedCount = 0;
            for(let i=0; i<total; i++) {
                if(stepDataStore[i] && stepDataStore[i].isSubmitted) completedCount++;
            }
            const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);

            if(currentStepIndex === total - 1) {
                btnNext.innerHTML = 'Kết thúc buổi học';
                btnNext.classList.replace('bg-[#1a73e8]', 'bg-green-600');
            } else {
                btnNext.innerHTML = 'Tiếp <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>';
                btnNext.classList.replace('bg-green-600', 'bg-[#1a73e8]');
            }
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('timeRemaining').innerText = `Tiến độ: ${percent}%`;
        }

        function nextStep() {
            saveDraft();
            
            // Lấy % hiện tại
            const total = currentExercises.length;
            let completedCount = 0;
            for(let i=0; i<total; i++) {
                if(stepDataStore[i] && stepDataStore[i].isSubmitted) completedCount++;
            }
            const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);

            if(currentStepIndex < total - 1) {
                goToStep(currentStepIndex + 1);
            } else {
                // NẾU LÀ BÀI CUỐI CÙNG MÀ CHƯA ĐẠT 100% -> CHẶN LẠI
                if(percent < 100) {
                    alert(`Bạn mới hoàn thành ${percent}%.\nVui lòng kiểm tra lại các bài chưa có dấu (✓) bên cột trái và ấn nút "Nộp bài" trước khi Kết thúc.`);
                } else {
                    // HIỂN THỊ THẺ XÁC NHẬN
                    const profile = JSON.parse(localStorage.getItem('kv_trainer_profile'));
                    document.getElementById('certName').innerText = profile.name;
                    document.getElementById('certDept').innerText = profile.dept;
                    document.getElementById('certSession').innerText = document.getElementById('sessionTitle').innerText;
                    
                    const now = new Date();
                    const timeString = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " ngày " + now.getDate() + "/" + (now.getMonth()+1) + "/" + now.getFullYear();
                    document.getElementById('certTime').innerText = timeString;
                    
                    document.getElementById('certificateModal').classList.remove('hidden');
                }
            }
        }
    </script>
</body>
</html>
