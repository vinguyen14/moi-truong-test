<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 2 - Thực hành KiotViet</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện tạo PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 10px; }
        .step-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 16px; border: 1px solid transparent; border-left: none;}
        .step-inactive { color: #5f6368; background: white; }
        .step-inactive:hover { background: #f1f3f4; }
        .step-inactive .step-circle { background: #e8eaed; color: #5f6368; }
        .step-active { background-color: #e8f0fe; color: #1a73e8; font-weight: 500;}
        .step-active .step-circle { background: #1a73e8; color: white; font-weight: bold; }
        .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px;}
        .group-header { padding: 16px 16px 8px; font-weight: bold; color: #5f6368; margin-top: 16px; border-bottom: 1px solid #e0e0e0; margin-right: 16px;}
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="certificateModal" class="fixed inset-0 bg-gray-900 bg-opacity-90 z-[100] flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4 text-center relative border-4 border-yellow-400">
            <!-- Nút Tải PDF và Loading -->
            <div id="pdfLoading" class="absolute inset-0 bg-white bg-opacity-80 flex-col items-center justify-center hidden">
                <svg class="animate-spin h-10 w-10 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="mt-4 font-bold text-blue-700">Đang tạo file PDF, vui lòng chờ...</p>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-2 uppercase">Xác Nhận Hoàn Thành</h2>
            <!-- ... Nội dung thẻ xác nhận ... -->
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button onclick="generatePDF()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4v12"></path></svg>
                    Tải báo cáo PDF
                </button>
                <a href="index.html" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition inline-block">Trở về Trang chủ</a>
            </div>
        </div>
    </div>

    <header class="bg-white border-b border-gray-200 z-20 flex flex-col shadow-sm sticky top-0">
        <div class="flex items-center justify-between px-4 lg:px-6 py-3">
            <div class="flex items-center gap-4">
                <a href="index.html">
                    <img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet Logo" class="h-8">
                </a>
                <div class="font-normal text-lg text-gray-700 pl-4 border-l border-gray-300 hidden sm:block" id="sessionTitle">Đang tải...</div>
            </div>
            <!-- ... Nội dung header còn lại ... -->
        </div>
        <!-- ... Progress Bar ... -->
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-full md:w-80 overflow-y-auto custom-scrollbar flex-shrink-0 hidden md:block pt-6">
            <ul id="stepList" class="flex flex-col gap-2"></ul>
        </aside>

        <main class="flex-1 overflow-y-auto custom-scrollbar relative p-4 md:p-6">
            <!-- ... Nội dung Main ... -->
        </main>
    </div>
    
    <footer class="text-center py-6 mt-auto bg-white border-t border-gray-200">
        <div class="flex flex-col items-center gap-3">
            <img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet Logo" class="h-5 opacity-60">
            <p class="text-xs text-gray-500">© 2026 KiotViet Learning & Development</p>
        </div>
    </footer>

    <!-- VÙNG RENDER PDF (ẨN) -->
    <div id="pdf-content" class="absolute -left-[9999px] top-0 bg-white p-10" style="width: 210mm;"></div>

    <script src="codelab-data.js"></script>
    <script>
        // --- SỬA CÁC BIẾN NÀY CHO TỪNG BUỔI ---
        const SESSION_ID = 'session_2'; 
        const STORAGE_KEY = 'kv_codelab_progress_b2';
        const DATA_KEY = 'kv_codelab_data_b2'; 
        // ------------------------------------

        // ... Các hàm JS khác không đổi ...

        function renderSidebar() {
            const listUl = document.getElementById('stepList');
            listUl.innerHTML = '';
            currentExercises.forEach((ex, index) => {
                if(ex.isGroupHeader) {
                    const li = document.createElement('li');
                    li.className = 'group-header';
                    li.innerText = ex.title;
                    listUl.appendChild(li);
                } else {
                    const li = document.createElement('li');
                    li.className = `step-item shadow-sm ${index === currentStepIndex ? 'step-active' : 'step-inactive'}`;
                    li.onclick = () => goToStep(index);
                    const isSubmitted = stepDataStore[index] && stepDataStore[index].isSubmitted;
                    li.innerHTML = `<div class="step-circle">${isSubmitted ? '✓' : (index + 1)}</div><div class="leading-snug text-[14px]">${ex.title}</div>`;
                    listUl.appendChild(li);
                }
            });
        }
        
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdfLoading = document.getElementById('pdfLoading');
            const pdfContent = document.getElementById('pdf-content');
            
            pdfLoading.style.display = 'flex';

            let reportHtml = `<h1 style="font-size: 24px; font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px;">Báo cáo thực hành - ${document.getElementById('sessionTitle').innerText}</h1>`;
            const profile = JSON.parse(localStorage.getItem('kv_trainer_profile'));
            reportHtml += `<p><strong>Học viên:</strong> ${profile.name} - ${profile.dept}</p><p><strong>Khóa học:</strong> ${APP_CONFIG.COURSE_NAME}</p><hr style="margin: 20px 0;">`;

            for(let i=0; i<currentExercises.length; i++) {
                if(currentExercises[i].isGroupHeader) continue;
                const ex = currentExercises[i];
                const data = stepDataStore[i] || {};
                
                reportHtml += `<div style="margin-bottom: 30px; page-break-inside: avoid;">`;
                reportHtml += `<h2 style="font-size: 18px; font-weight: bold; color: #1a73e8;">${ex.title}</h2>`;
                if(data.text) {
                    reportHtml += `<div style="background: #f1f3f4; border: 1px solid #e0e0e0; padding: 10px; margin-top: 10px; border-radius: 5px; white-space: pre-wrap;">${data.text}</div>`;
                }
                if(data.uploadedUrls && data.uploadedUrls.length > 0) {
                    reportHtml += `<p style="margin-top: 10px; font-weight: 500;">Ảnh minh chứng:</p>`;
                    data.uploadedUrls.forEach(url => {
                        reportHtml += `<img src="${url.replace('=s220', '=s800')}" style="max-width: 100%; border: 1px solid #ccc; margin-top: 5px; border-radius: 5px;">`;
                    });
                }
                reportHtml += `</div>`;
            }
            
            pdfContent.innerHTML = reportHtml;
            
            const canvas = await html2canvas(pdfContent, { scale: 2, useCORS: true });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
            
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
            pdf.save(`${profile.name} - Báo cáo ${SESSION_ID}.pdf`);

            pdfLoading.style.display = 'none';
        }

        // ... Các hàm JS còn lại không đổi ...
    </script>
</body>
</html>
