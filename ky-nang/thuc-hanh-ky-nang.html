<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực hành Kịch bản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .group:hover .tooltip { display: block; }
        @media print { body * { visibility: hidden; } #pdf-content, #pdf-content * { visibility: visible; } #pdf-content { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; background: white; } .print-page-break { page-break-inside: avoid; margin-bottom: 40px; } header, aside, .fixed { display: none !important; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden relative">

    <header class="bg-white/90 backdrop-blur border-b border-slate-200 h-16 flex items-center justify-between px-6 z-20 shrink-0 sticky top-0 shadow-sm">
        <div class="flex items-center gap-4"><a href="index.html" class="font-bold text-xs text-slate-500 hover:text-indigo-600 px-3 py-1.5 rounded-lg border border-slate-200"><i class="fas fa-chevron-left"></i> Trang chủ</a><div class="font-black text-sm text-indigo-700">Đào tạo Kịch bản Direct Sales</div></div>
        <div class="flex items-center gap-3"><button onclick="fetchFeedback(true)" class="text-xs font-bold text-amber-700 bg-amber-50 px-3 py-2 rounded-lg relative"><i class="fas fa-sync-alt mr-1"></i> Kiểm tra Nhận Xét <span id="notiDot" class="hidden absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute h-full w-full rounded-full bg-red-400"></span><span class="relative rounded-full h-3 w-3 bg-red-500"></span></span></button><div class="text-xs font-bold text-indigo-600 bg-slate-100 px-3 py-2 rounded-lg" id="studentLabel">👤 Chưa định danh</div></div>
    </header>

    <main id="dashboardView" class="flex-1 overflow-y-auto p-8"><div class="max-w-5xl mx-auto"><div class="bg-indigo-50 p-6 rounded-3xl mb-8"><h2 class="text-xl font-black text-indigo-800 mb-2">II. HƯỚNG DẪN</h2><p class="text-sm font-medium text-indigo-900">Chọn 1 tình huống. Bấm icon 💡 để xem gợi ý. <b class="text-red-600">Bấm LƯU sau mỗi bước</b>. Bản sửa lại sẽ lưu lịch sử Version.</p></div><h3 class="text-sm font-black text-slate-400 mb-4"><i class="fas fa-tasks text-indigo-500"></i> Chọn tình huống thực hành</h3><div id="gridScenarios" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div></div><div class="fixed bottom-0 right-0 p-4"><button id="btnCert" onclick="showCert()" class="hidden bg-emerald-100 text-emerald-700 px-8 py-3 rounded-xl font-black text-sm border border-emerald-300"><i class="fas fa-search"></i> Xem lại & In PDF</button></div></main>

    <main id="workspaceView" class="flex-1 overflow-y-auto bg-slate-100 hidden flex-col">
        <div class="bg-white p-4 px-8 shadow-sm flex justify-between items-center sticky top-0 z-30">
            <div><button onclick="backToDashboard()" class="text-xs font-bold text-slate-500 hover:text-indigo-600 mb-1"><i class="fas fa-arrow-left"></i> Quay lại</button><h2 id="wsTitle" class="text-xl font-black text-indigo-800">Tên tình huống</h2></div>
            <div class="w-64"><div class="flex justify-between text-xs font-bold mb-1"><span class="text-slate-500">Tiến độ</span><span id="wsProgressText" class="text-indigo-600">0%</span></div><div class="bg-slate-200 h-2.5 rounded-full"><div id="wsProgressBar" class="bg-indigo-500 h-full rounded-full" style="width: 0%"></div></div></div>
        </div>
        <div class="p-8 flex-1"><div id="wsContent" class="max-w-4xl mx-auto space-y-6 pb-24"></div></div>
        <div id="wsBottomBar" class="fixed bottom-0 right-0 w-full bg-white p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] flex justify-between items-center px-8 z-40">
            <input type="text" id="inpLink" class="w-full max-w-lg bg-white border border-slate-300 rounded-lg px-4 py-2 text-sm" placeholder="Dán link tham khảo (nếu có)...">
            <button id="btnSubmitEx" onclick="submitCurrentExercise()" disabled class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black text-sm opacity-50">Nộp Kịch Bản</button>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-slate-900/80 z-[200] flex items-center justify-center p-4"><div class="bg-white rounded-3xl p-8 max-w-md w-full"><h2 class="text-2xl font-black text-slate-800 mb-4"><i class="fas fa-user-shield text-indigo-600"></i> Định danh</h2><input type="text" id="inpName" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-bold mb-4" placeholder="Họ và tên"><input type="text" id="inpDept" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 text-sm font-bold mb-4" placeholder="Phòng ban"><button onclick="saveProfile()" class="w-full bg-indigo-600 text-white font-black py-3 rounded-xl">Bắt đầu</button></div></div>
    
    <div id="reviewModal" class="fixed inset-0 bg-slate-900/90 z-[110] hidden flex-col"><div class="bg-white px-6 py-4 flex justify-between items-center"><h2 class="text-lg font-black"><i class="fas fa-file-alt text-indigo-600"></i> Lịch sử bài làm</h2><div><button onclick="logAndPrint()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm mr-2"><i class="fas fa-print"></i> In / Lưu PDF</button><button onclick="closeReviewModal()" class="w-10 h-10 bg-slate-100 rounded-full font-bold text-slate-600"><i class="fas fa-times"></i></button></div></div><div id="reviewModalContent" class="flex-1 overflow-y-auto p-8 bg-slate-100"></div></div>
    <div id="pdf-content" class="absolute -left-[9999px] top-0 p-10 bg-white"></div>

    <script src="codelab-data.js?v=11"></script>
    <script>
        const API_URL = APP_CONFIG.API_URL; const DATA_KEY = 'kv_codelab_data_kynang'; 
        let stepDataStore = JSON.parse(localStorage.getItem(DATA_KEY)) || {}; let activeScenarioIndex = -1;

        document.addEventListener('DOMContentLoaded', () => {
            const profileRaw = localStorage.getItem('kv_trainer_profile'); 
            if(profileRaw) { document.getElementById('studentLabel').innerText = `👤 ${JSON.parse(profileRaw).name}`; renderDashboard(); setTimeout(() => fetchFeedback(false), 1000); } 
            else document.getElementById('authModal').classList.remove('hidden');
        });

        function saveProfile() {
            let n = document.getElementById('inpName').value.trim(); 
            let d = document.getElementById('inpDept').value.trim();
            if(!n || !d) return alert("Vui lòng điền đủ Họ Tên và Phòng Ban!"); 
            
            // Lưu vào LocalStorage
            localStorage.setItem('kv_trainer_profile', JSON.stringify({name:n, dept:d})); 
            
            // Ẩn Modal và Cập nhật UI ngay lập tức (Không dùng reload nữa)
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('studentLabel').innerText = `👤 ${n} - ${d}`;
            
            // Gọi load dữ liệu
            loadSessionData();
        }

        function renderDashboard() {
            const grid = document.getElementById('gridScenarios'); grid.innerHTML = ''; let hasSub = false;
            CODELAB_DATA[0].exercises.forEach((ex, i) => {
                if(ex.isGroupHeader || ex.title.includes('Tham khảo')) return;
                let d = stepDataStore[i] || {}; let count = 0;
                if(d.textAnswers) d.textAnswers.forEach(a => { if(a.trim()) count++; });
                let pct = ex.theory.length ? Math.round((count/ex.theory.length)*100) : 0; if(d.isSubmitted) hasSub = true;
                
                let st = d.isSubmitted ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-black absolute top-4 right-4">ĐÃ NỘP (Lần ${d.submitCount||1})</span>` : (pct>0 ? `<span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black absolute top-4 right-4">${pct}%</span>` : '');
                let fb = d.isUnread ? `<span class="absolute -top-3 -right-3 bg-red-500 text-white px-3 py-1 text-[10px] font-black rounded-full animate-bounce">Có Feedback</span>` : '';
                grid.innerHTML += `<div onclick="openScenario(${i})" class="glass-panel p-6 rounded-3xl relative cursor-pointer hover:-translate-y-1 transition">${st}${fb}<div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-xl mb-4 font-black"><i class="fas fa-keyboard"></i></div><h4 class="font-black text-slate-800 text-lg mb-2">${ex.title}</h4><div class="bg-slate-200 h-1.5 rounded-full mt-6"><div class="bg-indigo-500 h-full rounded-full" style="width:${pct}%"></div></div></div>`;
            });
            if(hasSub) document.getElementById('btnCert').classList.remove('hidden');
        }

        function openScenario(index) {
            activeScenarioIndex = index; let ex = CODELAB_DATA[0].exercises[index]; let d = stepDataStore[index] || {textAnswers:[], submittedAnswers:[], submitCount:0};
            document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('workspaceView').classList.remove('hidden');
            document.getElementById('wsTitle').innerText = ex.title; if(d.isUnread){ d.isUnread=false; localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore)); }
            
            let html = ``; let fbObj = parseFB(d.feedback);
            if(fbObj.general) html += `<div class="bg-amber-50 p-5 rounded-xl border border-amber-200 mb-6"><h3 class="font-black text-amber-800 text-sm mb-2"><i class="fas fa-bullhorn"></i> GV Nhận xét:</h3><p class="text-sm font-medium text-amber-900">${fbObj.general}</p></div>`;
            if(d.isSubmitted) html += `<div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 mb-6"><p class="font-black text-emerald-800 text-sm">Đã nộp bài (Lần ${d.submitCount}). Bạn có thể sửa nội dung bên dưới để nộp bổ sung.</p></div>`;

            ex.theory.forEach((q, qIdx) => {
                let currentAns = d.textAnswers[qIdx] || ''; let oldAns = d.submittedAnswers ? d.submittedAnswers[qIdx] : '';
                let isFilled = currentAns.trim() !== "";
                let refText = ex.stepRefs ? ex.stepRefs[qIdx] : "Chưa có gợi ý.";
                let btnTxt = isFilled ? "Đã lưu" : "Lưu bước này"; 
                if(isFilled && d.isSubmitted && currentAns !== oldAns) btnTxt = `Lưu bổ sung (Lần ${d.submitCount + 1})`;

                let historyHtml = (d.isSubmitted && oldAns) ? `<div class="bg-slate-100 p-3 mb-3 rounded-lg border border-slate-200"><p class="text-[10px] font-black text-slate-400 uppercase mb-1">Phiên bản đã nộp (Lần ${d.submitCount}):</p><p class="text-sm text-slate-500 font-medium whitespace-pre-wrap">${oldAns}</p></div>` : '';

                html += `
                <div class="mb-6 bg-white border border-slate-200 rounded-2xl shadow-sm relative">
                    <div class="bg-slate-50 p-3 px-5 border-b border-slate-200 flex justify-between items-center group">
                        <p class="font-black text-sm uppercase flex items-center gap-2">${q} 
                            <span class="relative cursor-help text-indigo-500"><i class="fas fa-lightbulb"></i>
                                <div class="tooltip hidden absolute top-6 left-0 w-80 bg-slate-800 text-white p-4 rounded-xl shadow-2xl z-50 text-xs font-medium">${refText}</div>
                            </span>
                        </p>
                        ${fbObj[`step${qIdx}`] ? `<span class="bg-amber-100 text-amber-700 px-2 py-1 rounded text-xs font-black animate-pulse">Có nhận xét</span>` : ''}
                    </div>
                    <div class="p-5">
                        ${fbObj[`step${qIdx}`] ? `<div class="bg-amber-50 p-3 rounded-lg mb-3 border border-amber-200 text-sm text-amber-900 font-medium"><b>GV Sửa:</b> ${fbObj[`step${qIdx}`]}</div>` : ''}
                        ${historyHtml}
                        <textarea id="inpStep_${qIdx}" rows="4" class="w-full bg-white border border-indigo-100 rounded-lg p-4 outline-none font-medium text-sm focus:border-indigo-400" placeholder="Gõ kịch bản mới của bạn...">${currentAns}</textarea>
                    </div>
                    <div class="bg-slate-50 px-5 py-3 border-t border-slate-100 flex justify-end"><button id="btnSave_${qIdx}" onclick="saveStep(${qIdx})" class="px-5 py-2 text-xs font-bold rounded-lg ${isFilled?'bg-emerald-100 text-emerald-700':'bg-white border'}">${btnTxt}</button></div>
                </div>`;
            });
            document.getElementById('wsContent').innerHTML = html; document.getElementById('inpLink').value = d.linkAttachment || ""; updateProgress();
        }

        function saveStep(idx) {
            let val = document.getElementById(`inpStep_${idx}`).value.trim(); if(!val) return alert("Nhập nội dung!");
            if(!stepDataStore[activeScenarioIndex]) stepDataStore[activeScenarioIndex] = {textAnswers:[], submittedAnswers:[], submitCount:0};
            stepDataStore[activeScenarioIndex].textAnswers[idx] = val; localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore));
            let d = stepDataStore[activeScenarioIndex]; let btn = document.getElementById(`btnSave_${idx}`);
            btn.innerHTML = d.isSubmitted ? `Lưu bổ sung (Lần ${d.submitCount + 1})` : "Đã lưu"; btn.className = "px-5 py-2 text-xs font-bold rounded-lg bg-emerald-100 text-emerald-700";
            updateProgress();
        }

        function updateProgress() {
            let d = stepDataStore[activeScenarioIndex] || {}; let len = 5; let f = 0;
            if(d.textAnswers) d.textAnswers.forEach(a => { if(a.trim()) f++; });
            let p = Math.round((f/len)*100); document.getElementById('wsProgressBar').style.width = p+'%'; document.getElementById('wsProgressText').innerText = p+'%';
            let btn = document.getElementById('btnSubmitEx');
            if(f===len) { btn.disabled=false; btn.classList.remove('opacity-50'); btn.innerHTML = d.isSubmitted ? `Nộp Bản Bổ Sung Lần ${d.submitCount+1}` : "Nộp Kịch Bản"; } 
            else { btn.disabled=true; btn.classList.add('opacity-50'); btn.innerHTML = `Lưu đủ ${len} bước để nộp`; }
        }

        function submitCurrentExercise() {
            let d = stepDataStore[activeScenarioIndex]; let ex = CODELAB_DATA[0].exercises[activeScenarioIndex];
            const p = JSON.parse(localStorage.getItem('kv_trainer_profile')); d.submitCount = (d.submitCount || 0) + 1;
            
            let btn = document.getElementById('btnSubmitEx'); btn.innerHTML = "Đang nộp..."; btn.disabled = true;
            d.linkAttachment = document.getElementById('inpLink').value.trim();
            d.submittedAnswers = [...d.textAnswers]; // Lưu snapshot version cũ

            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:"submit", studentName: p.name, department: p.dept, exerciseTitle: ex.title, isUpdate: d.submitCount>1, submitCount: d.submitCount, textAnswers: d.textAnswers, linkAttachment: d.linkAttachment }) })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') { d.isSubmitted=true; localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore)); alert("Nộp bài thành công!"); backToDashboard(); }
            }).finally(() => { btn.innerHTML = "Xong"; btn.disabled = false; });
        }

        function showCert() {
            let p = JSON.parse(localStorage.getItem('kv_trainer_profile')); let html = '';
            CODELAB_DATA[0].exercises.forEach((ex, i) => {
                let d = stepDataStore[i]; if(!d || !d.isSubmitted) return;
                html += `<div class="bg-white p-8 rounded-2xl shadow-sm mb-6"><h2 class="text-lg font-black text-indigo-700 mb-4">${ex.title} (Nộp lần ${d.submitCount})</h2>`;
                ex.theory.forEach((q, qIdx) => { html += `<div class="mb-4 bg-slate-50 border border-slate-200 rounded-xl overflow-hidden"><div class="bg-indigo-50 px-4 py-2 font-bold text-sm text-slate-700">${q}</div><p class="p-4 text-sm font-medium whitespace-pre-wrap">${d.textAnswers[qIdx]}</p></div>`; });
                if(d.feedback) html += `<div class="bg-amber-50 p-4 rounded-xl border border-amber-500 mt-4"><h3 class="text-sm font-black text-amber-800">GV Nhận xét:</h3><p class="text-sm font-medium text-amber-900 whitespace-pre-wrap">${parseFB(d.feedback).general}</p></div>`;
                html += `</div>`;
            });
            document.getElementById('reviewModalContent').innerHTML = html; document.getElementById('reviewModal').classList.remove('hidden'); document.getElementById('reviewModal').classList.add('flex');
            document.getElementById('pdf-content').innerHTML = `<h1 style="text-align:center;color:#4f46e5;font-size:24px;">BÁO CÁO KỊCH BẢN</h1><p style="text-align:center;">Học viên: ${p.name} - ${p.dept}</p>` + html;
        }

        function logAndPrint() {
            let p = JSON.parse(localStorage.getItem('kv_trainer_profile'));
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:"log_pdf_export", studentName: p.name }) });
            window.print();
        }

        function backToDashboard() { document.getElementById('workspaceView').classList.add('hidden'); document.getElementById('dashboardView').classList.remove('hidden'); renderDashboard(); }
        function closeReviewModal() { document.getElementById('reviewModal').classList.add('hidden'); document.getElementById('reviewModal').classList.remove('flex'); }
        function parseFB(s) { try{ return JSON.parse(s||"{}"); }catch(e){ return {general:s}; } }
        
        function fetchFeedback(isManual) {
            let p = JSON.parse(localStorage.getItem('kv_trainer_profile')); if(!p) return;
            if(isManual) document.getElementById('btnFeedbackText').innerText = "Đang tải...";
            fetch(`${API_URL}?action=get_feedback&studentName=${encodeURIComponent(p.name)}`).then(r=>r.json()).then(res => {
                if(res.status==='success'){
                    let d = res.allData["Thực hành Kịch bản"]; let hasNew = false;
                    if(d) {
                        CODELAB_DATA[0].exercises.forEach((ex, i) => {
                            if(d[ex.title]) {
                                if(!stepDataStore[i]) stepDataStore[i]={}; 
                                if(stepDataStore[i].feedback !== d[ex.title]) { stepDataStore[i].feedback = d[ex.title]; stepDataStore[i].isUnread = true; hasNew = true; }
                            }
                        });
                    }
                    if(hasNew) { localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore)); renderDashboard(); document.getElementById('notiDot').classList.remove('hidden'); }
                    if(isManual) alert(hasNew ? "Có nhận xét mới!" : "Chưa có nhận xét.");
                }
            }).finally(()=> { if(isManual) document.getElementById('btnFeedbackText').innerText = "Kiểm tra Nhận Xét"; });
        }
    </script>
</body>
</html>
