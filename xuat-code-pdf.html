<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer OS - Pro Preview & Print Emulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-hover': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        /* Class chuẩn hệ thống */
        .saas-card {
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        
        /* Nền caro mô phỏng bàn làm việc (Canvas) */
        .canvas-bg {
            background-color: #e2e8f0;
            background-image: 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1), 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%, transparent 75%, #cbd5e1 75%, #cbd5e1);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        /* Iframe bọc trong wrapper để xử lý Zoom */
        #iframe-wrapper {
            transform-origin: center center;
            transition: transform 0.2s ease-out;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background: white;
        }
        #slide-preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        /* Custom scrollbar cho textarea */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-primary text-white p-2 rounded shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900">Instant PDF Builder</h1>
                <p class="text-sm text-slate-500">In siêu tốc 0s - Khóa tỷ lệ chống vỡ Layout</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="renderHTML()" class="btn-secondary flex items-center gap-2" title="Ctrl + Enter để xem nhanh">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Render Giao Diện
            </button>
            <button onclick="exportToPDF()" class="btn-primary flex items-center gap-2 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                Xuất PDF (Siêu Tốc)
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-1 p-6 flex gap-6 overflow-hidden">
        
        <!-- Cột trái: Nhập HTML -->
        <div class="w-1/3 flex flex-col gap-2 relative h-full">
            <label for="html-input" class="font-semibold text-slate-700 flex justify-between items-center">
                Mã nguồn HTML / CSS
                <span id="save-status" class="text-xs font-normal text-emerald-600 bg-emerald-50 px-2 py-1 rounded hidden transition-all border border-emerald-200">Đã lưu nháp!</span>
            </label>
            <textarea id="html-input" class="saas-card w-full flex-1 p-4 font-mono text-[13px] text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none leading-relaxed" placeholder="Dán toàn bộ mã HTML của bạn vào đây..."></textarea>
        </div>

        <!-- Cột phải: Khung xem trước & Giả lập -->
        <div class="w-2/3 flex flex-col gap-2 h-full">
            
            <!-- Toolbar kích thước -->
            <div class="flex justify-between items-center bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm shrink-0">
                <div class="flex items-center gap-3">
                    <label class="text-sm font-semibold text-slate-700">Khóa tỷ lệ & Giả lập:</label>
                    <select id="canvas-size" class="text-sm border border-slate-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-primary text-slate-700 font-medium" onchange="updateScale()">
                        <option value="responsive">🌐 Tự do (Dễ bị vỡ khi in)</option>
                        <optgroup label="Bản Trình Bày (Khuyên dùng)">
                            <option value="1920x1080">🖥️ Khóa chuẩn Slide 16:9 (1920px)</option>
                            <option value="1123x794" selected>📄 Khóa chuẩn A4 Ngang (1123px)</option>
                        </optgroup>
                        <optgroup label="Khác">
                            <option value="794x1123">📄 Giấy A4 - Dọc (794px)</option>
                            <option value="375x812">📱 Mobile (375px)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-500 bg-slate-100 px-2 py-1 rounded border border-slate-200" id="zoom-level">Scale: 100%</span>
                </div>
            </div>

            <!-- Khu vực mặt bàn Canvas -->
            <div id="preview-container" class="saas-card flex-1 canvas-bg overflow-hidden flex items-center justify-center relative rounded-lg border border-slate-300 inset-shadow">
                
                <!-- Wrapper xử lý Scale -->
                <div id="iframe-wrapper">
                    <iframe id="slide-preview-frame"></iframe>
                </div>
                
            </div>
        </div>

    </main>

    <script>
        const LOCAL_STORAGE_KEY = 'kv_slide_builder_draft';
        const htmlInput = document.getElementById('html-input');
        const saveStatus = document.getElementById('save-status');

        // ==========================================
        // 1. TÍNH TOÁN ZOOM UI (KHÔNG ẢNH HƯỞNG TỚI IN)
        // ==========================================
        function updateScale() {
            const size = document.getElementById('canvas-size').value;
            const container = document.getElementById('preview-container');
            const wrapper = document.getElementById('iframe-wrapper');
            const zoomLabel = document.getElementById('zoom-level');
            
            if (!container || !wrapper) return;

            if (size === 'responsive') {
                wrapper.style.width = '100%';
                wrapper.style.height = '100%';
                wrapper.style.transform = 'scale(1)';
                zoomLabel.innerText = 'Scale: Khớp';
            } else {
                const [w, h] = size.split('x').map(Number);
                wrapper.style.width = w + 'px';
                wrapper.style.height = h + 'px';
                
                const padding = 64; 
                const availableWidth = container.clientWidth - padding;
                const availableHeight = container.clientHeight - padding;
                
                const scaleW = availableWidth / w;
                const scaleH = availableHeight / h;
                const scale = Math.min(scaleW, scaleH, 1);
                
                wrapper.style.transform = `scale(${scale})`;
                zoomLabel.innerText = `Scale: ${Math.round(scale * 100)}%`;
            }

            // Gọi hàm tiêm CSS khóa tỷ lệ in ấn
            injectPrintLock();
        }

        window.addEventListener('resize', updateScale);

        window.addEventListener('DOMContentLoaded', () => {
            const savedCode = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedCode) {
                htmlInput.value = savedCode;
                renderHTML();
            } else {
                renderDefaultInstruction();
            }
            setTimeout(updateScale, 100); 
        });

        // Tự động lưu
        let typingTimer;
        htmlInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                localStorage.setItem(LOCAL_STORAGE_KEY, htmlInput.value);
                saveStatus.classList.remove('hidden');
                setTimeout(() => saveStatus.classList.add('hidden'), 2000);
            }, 1000);
        });

        htmlInput.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                renderHTML();
            }
        });

        // ==========================================
        // 2. RENDER GIAO DIỆN VÀO IFRAME
        // ==========================================
        function renderHTML() {
            const codeInput = htmlInput.value;
            const iframe = document.getElementById('slide-preview-frame');
            
            if (!codeInput.trim()) {
                alert("Vui lòng nhập mã HTML.");
                renderDefaultInstruction();
                return;
            }
            
            const iframeDoc = iframe.contentWindow.document;
            iframeDoc.open();
            // Đẩy code người dùng vào
            iframeDoc.write(codeInput);
            // Tạo sẵn 1 thẻ Style trống để hàm injectPrintLock xử lý
            iframeDoc.write('<style id="dynamic-print-style"></style>');
            iframeDoc.close();
            
            updateScale();
        }

        function renderDefaultInstruction() {
            const iframe = document.getElementById('slide-preview-frame');
            const iframeDoc = iframe.contentWindow.document;
            const instructionHTML = `
                <html lang="vi">
                <body style="font-family: sans-serif; display: flex; flex-direction: column; height: 100%; margin: 0; align-items: center; justify-content: center; background-color: #ffffff; color: #94a3b8; text-align: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="height: 64px; width: 64px; margin-bottom: 16px; color: #cbd5e1;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <p style="font-size: 1.125rem;">Khu vực Xem Trước & In Tức Thì</p>
                </body>
                </html>
            `;
            iframeDoc.open();
            iframeDoc.write(instructionHTML);
            iframeDoc.close();
        }

        // ==========================================
        // 3. THUẬT TOÁN KHÓA TỶ LỆ IN (CHỐNG VỠ LAYOUT DO CHROME MARGIN)
        // ==========================================
        function injectPrintLock() {
            const iframe = document.getElementById('slide-preview-frame');
            if (!iframe || !iframe.contentWindow) return;
            const iframeDoc = iframe.contentWindow.document;
            
            const styleTag = iframeDoc.getElementById('dynamic-print-style');
            if (!styleTag) return; // Nếu chưa render xong thì bỏ qua
            
            const sizeSelect = document.getElementById('canvas-size').value;
            
            // Mặc định ép chiều rộng 1123px (A4) để bảo vệ các cột Tailwind (tránh bị Responsive bóp lại)
            let w = 1123; 
            let orientation = 'landscape';

            if (sizeSelect !== 'responsive') {
                const [width, height] = sizeSelect.split('x').map(Number);
                w = width;
                orientation = width > height ? 'landscape' : 'portrait';
            }

            styleTag.innerHTML = `
                @media print {
                    @page { 
                        size: A4 ${orientation} !important; 
                        margin: 0 !important; 
                    }
                    /* ÉP PIXEL TẠO LÁ CHẮN BẢO VỆ: Máy in bắt buộc phải render như màn hình Desktop ${w}px */
                    html, body {
                        width: ${w}px !important;
                        min-width: ${w}px !important;
                        max-width: ${w}px !important;
                        margin: 0 !important;
                        padding: 0 !important;
                        -webkit-print-color-adjust: exact !important;
                        print-color-adjust: exact !important;
                    }
                    /* Vô hiệu hóa max-w-5xl trong code gốc, bắt nó mở rộng tối đa */
                    .max-w-5xl, .w-full, .slide-card {
                        width: ${w}px !important;
                        max-width: ${w}px !important;
                    }
                }
            `;
        }

        // ==========================================
        // 4. LỆNH IN SIÊU TỐC TRỰC TIẾP
        // ==========================================
        function exportToPDF() {
            const iframe = document.getElementById('slide-preview-frame');
            const codeInput = htmlInput.value;
            
            if (!codeInput.trim()) {
                alert("Không có dữ liệu để in.");
                return;
            }

            // Gọi hàm tiêm CSS lần cuối để đảm bảo tỷ lệ đã được khóa cứng
            injectPrintLock();

            // In ngay lập tức tại Iframe hiện tại (Độ trễ = 0s, không nhảy Tab)
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }
    </script>
</body>
</html>
