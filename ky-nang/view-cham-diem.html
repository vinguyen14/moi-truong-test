<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Kịch Bản (GV)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden">

    <script>const CONFIG = { API_URL: "https://script.google.com/macros/s/AKfycbxpQow0IJ8OYY2tTqvJK-5zcmmS2G4a1f_atwngD0O_c0skmzIeiUu-V_93A-KtRlH3BA/exec" };</script>

    <div id="toastAlert" onclick="filterPendingOnly()" class="fixed top-6 right-6 bg-amber-500 text-white px-6 py-4 rounded-2xl shadow-2xl z-50 transform transition-all translate-x-full font-black flex items-center gap-3 cursor-pointer hover:bg-amber-600">
        <i class="fas fa-bell text-2xl animate-bounce"></i> <span id="toastText"></span>
    </div>

    <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-xl z-20 shrink-0">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3"><div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-xl shadow-lg"><i class="fas fa-graduation-cap"></i></div><div><h1 class="font-black text-lg">KiotViet L&D</h1><p class="text-[10px] text-slate-400 font-bold uppercase">Portal Giảng Viên</p></div></div>
        <div class="p-4 flex-1 overflow-y-auto">
            <button onclick="loadSubmissions()" id="btnRefresh" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 mb-6"><i class="fas fa-sync-alt"></i> Tải dữ liệu</button>
            <div class="space-y-4">
                <div><label class="text-xs font-semibold text-slate-400 mb-1 block">Tên HV / PB</label><input type="text" id="fltText" oninput="applyFilters()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-indigo-500" placeholder="VD: Nguyễn Văn A"></div>
                <div><label class="text-xs font-semibold text-slate-400 mb-1 block">Trạng thái</label><select id="fltStatus" onchange="applyFilters()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white outline-none"><option value="all">Tất cả bài nộp</option><option value="pending" selected>🟠 Chờ chấm</option><option value="graded">🟢 Đã chấm</option><option value="skipped">⚪ Đã bỏ qua</option></select></div>
            </div>
            <div class="mt-8 bg-slate-800/50 p-4 rounded-xl border border-slate-700"><p class="text-xs font-bold text-slate-400 uppercase mb-3">Thống kê</p><div class="flex justify-between items-center text-sm font-medium text-slate-300 mb-2"><span>Tổng số bài:</span><span id="statTotal" class="font-black text-white">0</span></div><div class="flex justify-between items-center text-sm font-medium text-slate-300"><span>Chờ chấm:</span><span id="statPending" class="font-black text-amber-400">0</span></div></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative bg-slate-50">
        <header class="bg-white h-16 border-b border-slate-200 px-8 flex items-center shadow-sm z-10"><h2 class="font-black text-slate-800 text-lg">Danh Sách Kịch Bản</h2></header>
        <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur z-50 flex flex-col items-center justify-center hidden"><i class="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i><p class="font-bold text-slate-600">Đang tải...</p></div>
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar"><div id="submissionsList" class="max-w-5xl mx-auto space-y-6 pb-20"></div></div>
    </main>

    <script>
        let allData = [];

        function loadSubmissions() {
            document.getElementById('loading').classList.remove('hidden'); document.getElementById('btnRefresh').disabled = true;
            fetch(CONFIG.API_URL + '?action=get_all_submissions').then(r => r.json()).then(res => {
                if(res.status === 'success') { 
                    allData = res.data; applyFilters(); 
                    let pC = allData.filter(d => { let f = parseFB(d.feedback); return f.status !== 'graded' && f.status !== 'skipped'; }).length;
                    if(pC > 0) { document.getElementById('toastText').innerText = `CÓ ${pC} BÀI CHỜ CHẤM! BẤM VÀO ĐÂY ĐỂ LỌC`; document.getElementById('toastAlert').classList.remove('translate-x-full'); setTimeout(() => document.getElementById('toastAlert').classList.add('translate-x-full'), 8000); }
                } 
            }).finally(() => { document.getElementById('loading').classList.add('hidden'); document.getElementById('btnRefresh').disabled = false; });
        }

        function parseFB(str) { try { return JSON.parse(str||'{"status":"pending"}'); } catch(e) { return { status: 'graded', general: str }; } }

        function filterPendingOnly() {
            document.getElementById('fltStatus').value = 'pending'; document.getElementById('toastAlert').classList.add('translate-x-full'); applyFilters();
        }

        function formatTime(str) {
            // Google Sheet trả về dạng "14/07/2026 10:30:00" nhờ dấu nháy đơn
            return str.replace(/'/g, ''); 
        }

        function applyFilters() {
            let tQ = document.getElementById('fltText').value.toLowerCase(); let sQ = document.getElementById('fltStatus').value;
            let f = allData.filter(item => {
                let fb = parseFB(item.feedback); let cS = fb.status || 'pending';
                let m1 = (item.studentName+item.department).toLowerCase().includes(tQ);
                let m2 = sQ === 'all' ? true : cS === sQ;
                return m1 && m2;
            });
            renderList(f);
        }

        function renderList(data) {
            const container = document.getElementById('submissionsList');
            if(data.length === 0) { container.innerHTML = `<div class="text-center py-20 bg-white rounded-3xl border border-dashed"><i class="fas fa-inbox text-5xl text-slate-300 mb-4"></i><p class="font-bold text-slate-500">Trống</p></div>`; return; }
            let pendingCount = 0; container.innerHTML = '';

            data.forEach((item, index) => {
                let fbObj = parseFB(item.feedback); let isUpd = item.exerciseTitle.includes("[BẢN BỔ SUNG");
                if(fbObj.status !== 'graded' && fbObj.status !== 'skipped') pendingCount++;
                
                let bSt = fbObj.status === 'graded' ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 text-[11px] font-black rounded-full">Đã chấm</span>` : (fbObj.status === 'skipped' ? `<span class="bg-slate-200 text-slate-600 px-3 py-1 text-[11px] font-black rounded-full">Bỏ qua</span>` : `<span class="bg-amber-100 text-amber-700 px-3 py-1 text-[11px] font-black rounded-full animate-pulse">Chờ chấm</span>`);
                let bUp = isUpd ? `<span class="bg-red-50 text-red-600 border border-red-200 px-2 py-0.5 rounded text-[10px] font-black">BẢN SỬA LẠI</span>` : `<span class="bg-slate-100 text-slate-500 border border-slate-200 px-2 py-0.5 rounded text-[10px] font-black">BẢN GỐC</span>`;
                let bPdf = item.pdfStatus ? `<span class="text-[10px] font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded"><i class="fas fa-print"></i> ĐÃ TẢI PDF</span>` : '';

                let stepsHtml = ''; let steps = ["TIẾP CẬN", "XÁC THỰC", "KHAI THÁC", "TƯ VẤN", "CHỐT"]; let ans = [item.ans1, item.ans2, item.ans3, item.ans4, item.ans5];
                for(let i=0; i<5; i++) {
                    stepsHtml += `<div class="bg-white rounded-xl border border-slate-200 overflow-hidden mb-4"><div class="p-3 bg-slate-50 border-b font-black text-xs text-indigo-500">BƯỚC ${i+1}: ${steps[i]}</div><p class="p-4 text-sm font-medium text-slate-800 whitespace-pre-wrap">${ans[i]||'(Trống)'}</p><div class="bg-amber-50 p-3 flex gap-3"><i class="fas fa-reply text-amber-400 mt-2"></i><textarea id="fb_step_${index}_${i}" rows="2" class="w-full bg-white border border-amber-200 rounded-lg p-2 text-xs font-medium outline-none" placeholder="Nhận xét riêng bước này...">${fbObj[`step${i}`]||''}</textarea></div></div>`;
                }

                container.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-5 flex justify-between cursor-pointer hover:bg-slate-50 border-b" onclick="document.getElementById('b_${index}').classList.toggle('hidden')">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center font-black"><i class="fas fa-user-edit"></i></div>
                            <div><h3 class="text-lg font-black text-slate-800">${item.studentName} (${item.department}) ${bUp} ${bPdf}</h3><p class="text-xs font-bold text-slate-500 mt-1">${formatTime(item.timestamp)} | <span class="text-indigo-600">${item.exerciseTitle}</span></p></div>
                        </div>
                        <div class="flex items-center">${bSt}</div>
                    </div>
                    <div id="b_${index}" class="hidden bg-slate-50/50 p-6">
                        ${stepsHtml}
                        ${item.links ? `<div class="mb-6"><p class="text-xs font-black text-slate-500 mb-2">LINK ĐÍNH KÈM CỦA HV:</p><a href="${item.links}" target="_blank" class="text-sm font-bold text-blue-600 underline">${item.links}</a></div>` : ''}
                        <div class="bg-slate-800 p-6 rounded-2xl">
                            <label class="text-sm font-black text-amber-400 mb-3 block">NHẬN XÉT TỔNG QUAN:</label>
                            <textarea id="fb_gen_${index}" rows="3" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 text-white font-medium outline-none mb-4">${fbObj.general||''}</textarea>
                            <div class="flex justify-between">
                                <button onclick="sendFB(${index}, '${item.studentName}', '${item.exerciseTitle}', 'skipped')" class="text-slate-400 hover:text-white text-sm font-bold"><i class="fas fa-eye-slash"></i> Đánh dấu Bỏ Qua</button>
                                <button onclick="sendFB(${index}, '${item.studentName}', '${item.exerciseTitle}', 'graded')" class="bg-amber-500 hover:bg-amber-400 text-slate-900 px-6 py-2.5 rounded-xl font-black shadow-lg"><i class="fas fa-paper-plane"></i> GỬI ĐIỂM BÀI NÀY</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('statTotal').innerText = data.length; document.getElementById('statPending').innerText = pendingCount;
        }

        function sendFB(idx, name, title, st) {
            let fd = { status: st, general: document.getElementById(`fb_gen_${idx}`).value };
            for(let i=0; i<5; i++) fd[`step${i}`] = document.getElementById(`fb_step_${idx}_${i}`).value;
            fetch(CONFIG.API_URL, { method: 'POST', body: JSON.stringify({ action:"update_feedback", studentName:name, exerciseTitle:title, feedback:JSON.stringify(fd) }) })
            .then(r=>r.json()).then(res => { if(res.status==='success') { alert("Đã xử lý!"); loadSubmissions(); } });
        }
    </script>
</body>
</html>
