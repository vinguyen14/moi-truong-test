<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 2 - Thực hành KiotViet</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 10px; }
        .step-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; border-radius: 0 24px 24px 0; margin-right: 16px; border: 1px solid transparent; border-left: none;}
        .step-inactive { color: #5f6368; background: white; }
        .step-inactive:hover { background: #f1f3f4; }
        .step-inactive .step-circle { background: #e8eaed; color: #5f6368; }
        .step-active { background-color: #e8f0fe; color: #1a73e8; font-weight: 500;}
        .step-active .step-circle { background: #1a73e8; color: white; font-weight: bold; }
        .step-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px;}
        .group-header { padding: 16px 16px 8px; font-weight: bold; color: #5f6368; margin-top: 16px; border-bottom: 1px solid #e0e0e0; margin-right: 16px;}
        
        @media print {
            body * { visibility: hidden; }
            #pdf-content, #pdf-content * { visibility: visible; }
            #pdf-content { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; }
            #certificateModal, header, footer, aside, .fixed { display: none !important; }
            .print-page-break { page-break-inside: avoid; margin-bottom: 30px; }
            img { max-width: 100% !important; height: auto !important; max-height: 500px; object-fit: contain; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="certificateModal" class="fixed inset-0 bg-gray-900 bg-opacity-90 z-[100] flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-lg w-full mx-4 text-center relative border-4 border-yellow-400">
            <h2 class="text-3xl font-bold text-gray-800 mb-2 uppercase">Xác Nhận Hoàn Thành</h2>
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <p class="text-gray-600 mb-4 text-lg">Chúc mừng bạn đã hoàn thành xuất sắc bài tập!</p>
            <div class="bg-gray-50 border border-gray-200 rounded p-4 text-left space-y-2 mb-6">
                <p><strong>👤 Họ và tên:</strong> <span id="certName" class="text-blue-700"></span></p>
                <p><strong>🏢 Phòng ban:</strong> <span id="certDept" class="text-blue-700"></span></p>
                <p><strong>📚 Bài học:</strong> <span id="certSession"></span></p>
                <p><strong>💯 Tiến độ:</strong> <span class="text-green-600 font-bold">100% (Đã nộp toàn bộ)</span></p>
                <p><strong>⏰ Thời gian:</strong> <span id="certTime" class="text-red-500 font-bold"></span></p>
            </div>
            <p class="text-sm font-bold text-red-600 mb-6 bg-red-50 p-2 rounded">YÊU CẦU: HÃY CHỤP ẢNH MÀN HÌNH NÀY VÀ GỬI VÀO NHÓM ZALO TRƯỚC 16:00</p>
            <div class="flex flex-col sm:flex-row gap-3 mt-6">
                <button onclick="generatePDF()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4v12"></path></svg>
                    Tải báo cáo PDF
                </button>
                <a href="index.html" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition inline-block">Trở về Trang chủ</a>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 z-20 flex flex-col shadow-sm sticky top-0">
        <div class="flex items-center justify-between px-4 lg:px-6 py-3">
            <div class="flex items-center gap-4">
                <a href="index.html"><img src="https://logo.kiotviet.vn/KiotViet-Logo-Horizontal.svg" alt="KiotViet Logo" class="h-8"></a>
                <div class="font-normal text-lg text-gray-700 pl-4 border-l border-gray-300 hidden sm:block" id="sessionTitle">Đang tải...</div>
            </div>
            <div class="flex items-center gap-3">
                <!-- NÚT ĐỒNG BỘ NHẬN XÉT TỪ GIẢNG VIÊN -->
                <button onclick="fetchFeedback()" class="hidden md:flex items-center gap-1 text-sm font-medium text-orange-600 bg-orange-50 border border-orange-200 px-3 py-1.5 rounded hover:bg-orange-100 transition shadow-sm" title="Kiểm tra nhận xét của Giảng viên">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    <span id="btnFeedbackText">Tải Nhận Xét</span>
                </button>

                <div class="flex items-center gap-3 text-sm font-medium text-gray-600 bg-gray-100 px-4 py-1.5 rounded border border-gray-200">
                    <span id="studentLabel" class="text-[#1a73e8] border-r border-gray-300 pr-3 font-medium hidden sm:inline">👤 Chưa định danh</span>
                    <span id="timeRemaining">Tiến độ: 0%</span>
                </div>
            </div>
        </div>
        <div class="w-full bg-gray-200 h-1"><div id="progressBar" class="bg-[#1a73e8] h-1 transition-all duration-300" style="width: 0%"></div></div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-full md:w-80 overflow-y-auto custom-scrollbar flex-shrink-0 hidden md:block pt-6">
            <ul id="stepList" class="flex flex-col gap-2"></ul>
        </aside>

        <main class="flex-1 overflow-y-auto custom-scrollbar relative p-4 md:p-6 bg-gray-50 flex flex-col">
            <div id="mainContent" class="max-w-4xl mx-auto bg-white border border-gray-200 rounded-lg shadow-sm p-6 md:p-10 mb-24 w-full"></div>
            
            <div class="fixed bottom-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-between items-center md:w-[calc(100%-20rem)] w-full z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button id="btnPrev" onclick="prevStep()" class="flex items-center gap-2 px-5 py-2 text-gray-600 font-medium hover:text-blue-600 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Trở lại
                </button>
                <button id="btnNext" onclick="nextStep()" class="flex items-center gap-2 px-6 py-2.5 text-white bg-[#1a73e8] hover:bg-blue-700 rounded transition shadow">
                    Tiếp <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </main>
    </div>

    <!-- Khung Render PDF ẩn -->
    <div id="pdf-content" class="absolute -left-[9999px] top-0 bg-white p-10 text-gray-800" style="width: 210mm;"></div>

    <script src="codelab-data.js"></script>
    <script>
        // ==========================================
        // CẤU HÌNH CHO TỪNG BUỔI (Đổi khi copy file)
        const SESSION_ID = 'session_2'; 
        const STORAGE_KEY = 'kv_codelab_progress_b2';
        const DATA_KEY = 'kv_codelab_data_b2'; 
        // ==========================================

        let currentStepIndex = 0; 
        let currentExercises = []; 
        let stepDataStore = {};
        
        // MẢNG LƯU TRỮ ẢNH TRONG BỘ NHỚ TẠM (Tránh lỗi mất file của input)
        let pendingFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedState = localStorage.getItem(STORAGE_KEY); if(savedState) currentStepIndex = parseInt(savedState) || 0;
            const savedData = localStorage.getItem(DATA_KEY); if(savedData) stepDataStore = JSON.parse(savedData);
            const profileRaw = localStorage.getItem('kv_trainer_profile'); 
            if(profileRaw) { const profile = JSON.parse(profileRaw); document.getElementById('studentLabel').innerText = `👤 ${profile.name}`; }
            loadSessionData();

            // LẮNG NGHE SỰ KIỆN PASTE (DÁN ẢNH TỪ CLIPBOARD)
            document.addEventListener('paste', function(e) {
                let items = e.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        let file = items[i].getAsFile();
                        // Đặt tên ngẫu nhiên cho ảnh dán
                        let newFile = new File([file], "Anh_Dan_" + Math.floor(Math.random()*1000) + ".png", {type: file.type});
                        pendingFiles.push(newFile);
                        renderFileTags(); // Cập nhật giao diện
                        
                        // Hiệu ứng nháy xanh nhẹ để báo dán thành công
                        const uploadArea = document.getElementById('uploadArea');
                        if(uploadArea) {
                            uploadArea.classList.add('bg-blue-50', 'border-blue-300');
                            setTimeout(() => uploadArea.classList.remove('bg-blue-50', 'border-blue-300'), 500);
                        }
                    }
                }
            });

            // Tự động kiểm tra nhận xét khi vừa vào web
            setTimeout(fetchFeedback, 2000); 
        });

        // ----------------------------------------------------
        // TÍNH NĂNG ĐỒNG BỘ NHẬN XÉT TỪ GOOGLE SHEETS VỀ WEB
        // ----------------------------------------------------
        function fetchFeedback() {
            const apiUrl = APP_CONFIG.API_URL;
            if(!apiUrl) return;
            const profileRaw = localStorage.getItem('kv_trainer_profile');
            if(!profileRaw) return;
            
            const profile = JSON.parse(profileRaw);
            const sessionName = document.getElementById('sessionTitle').innerText;
            const btnText = document.getElementById('btnFeedbackText');
            
            btnText.innerText = "Đang tải...";
            
            // Gọi API dạng GET
            fetch(`${apiUrl}?studentName=${encodeURIComponent(profile.name)}&session=${encodeURIComponent(sessionName)}`)
            .then(r => r.json())
            .then(res => {
                if(res.status === 'success' && res.data) {
                    let hasNew = false;
                    // Cập nhật nhận xét vào Store
                    for(let i=0; i<currentExercises.length; i++) {
                        const title = currentExercises[i].title;
                        if(res.data[title]) {
                            if(!stepDataStore[i]) stepDataStore[i] = {};
                            if(stepDataStore[i].feedback !== res.data[title]) {
                                stepDataStore[i].feedback = res.data[title];
                                hasNew = true;
                            }
                        }
                    }
                    if(hasNew) {
                        localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore));
                        goToStep(currentStepIndex); // Render lại để hiện nhận xét
                    }
                }
            })
            .catch(err => console.log(err))
            .finally(() => { btnText.innerText = "Tải Nhận Xét"; });
        }


        function loadSessionData() {
            const session = CODELAB_DATA.find(s => s.id === SESSION_ID);
            if(!session) return;
            document.getElementById('sessionTitle').innerText = session.title;
            currentExercises = session.exercises;
            if(currentExercises[currentStepIndex] && currentExercises[currentStepIndex].isGroupHeader) currentStepIndex++;
            renderSidebar(); goToStep(currentStepIndex);
        }

        function renderSidebar() {
            const listUl = document.getElementById('stepList'); listUl.innerHTML = '';
            let exerciseCounter = 1; 
            currentExercises.forEach((ex, index) => {
                if(ex.isGroupHeader) {
                    const li = document.createElement('li'); li.className = 'group-header'; li.innerText = ex.title; listUl.appendChild(li);
                } else {
                    const li = document.createElement('li'); li.className = `step-item shadow-sm ${index === currentStepIndex ? 'step-active' : 'step-inactive'}`; li.onclick = () => goToStep(index);
                    const isSubmitted = stepDataStore[index] && stepDataStore[index].isSubmitted;
                    // Hiện icon Chat nếu có nhận xét
                    const hasFeedback = stepDataStore[index] && stepDataStore[index].feedback ? '<span title="Có nhận xét" class="ml-auto text-orange-500">💬</span>' : '';
                    
                    li.innerHTML = `<div class="step-circle">${isSubmitted ? '✓' : exerciseCounter}</div><div class="leading-snug text-[14px] flex-1 flex items-center">${ex.title} ${hasFeedback}</div>`;
                    listUl.appendChild(li); exerciseCounter++;
                }
            });
        }

        function goToStep(index) {
            saveDraft(); 
            if(index < 0 || index >= currentExercises.length || currentExercises[index].isGroupHeader) return;
            currentStepIndex = index; const ex = currentExercises[index];
            
            // Xóa rỗng file tạm khi qua bài khác
            pendingFiles = [];

            document.querySelectorAll('#stepList li').forEach((li, i) => {
                if(!currentExercises[i].isGroupHeader) {
                    if(i === index) { li.className = `step-item shadow-sm step-active`; li.scrollIntoView({ behavior: 'smooth', block: 'center' }); } 
                    else li.className = `step-item shadow-sm step-inactive`;
                }
            });

            const contentDiv = document.getElementById('mainContent');
            let html = `<h1 class="text-2xl md:text-3xl text-gray-800 mb-8 pb-4 border-b border-gray-200 font-normal">${ex.title}</h1>`;
            const myData = stepDataStore[index] || { text: "", uploadedUrls: [], isSubmitted: false, feedback: "" };

            if(ex.theory && ex.theory.length > 0) {
                html += `<div class="mb-8"><p class="mb-3 text-[#1a73e8] font-bold text-lg">📝 Phần A: Câu hỏi lý thuyết</p><div class="bg-[#f1f3f4] p-5 rounded-lg text-gray-800 border border-gray-200 mb-4 space-y-2 text-[15px]">${ex.theory.map(t => `<p>${t}</p>`).join('')}</div><textarea id="inpTextAnswer_${index}" rows="4" class="w-full border border-gray-300 rounded-lg p-4 focus:ring-2 focus:ring-[#1a73e8] outline-none" placeholder="Gõ câu trả lời tự luận (nếu có)..." oninput="saveDraft()">${myData.text}</textarea></div>`;
            }

            if((ex.requirements && ex.requirements.length > 0) || (ex.instructions && ex.instructions.length > 0)) {
                html += `<p class="mb-3 text-[#1a73e8] font-bold text-lg">💻 Phần B: Bài tập thực hành</p>`;
            }
            if(ex.requirements && ex.requirements.length > 0) {
                html += `<div class="mb-6"><p class="mb-2 font-medium">Yêu cầu:</p><ul class="space-y-2 text-[15px] text-gray-700 pl-4 border-l-4 border-orange-400 bg-orange-50 py-3 pr-3 rounded-r-lg">${ex.requirements.map(r => `<li>${r}</li>`).join('')}</ul></div>`;
            }
            if(ex.instructions && ex.instructions.length > 0) {
                html += `<div class="mb-8"><p class="mb-2 font-medium">Hướng dẫn thao tác:</p><div class="bg-gray-50 p-5 rounded-lg font-mono text-[14px] text-gray-700 border border-gray-200 leading-relaxed space-y-3">${ex.instructions.map(i => `<p>${i}</p>`).join('')}</div></div>`;
            }

            // --- KHUNG HIỂN THỊ LỊCH SỬ NỘP & NHẬN XÉT ---
            let historyHtml = ""; let btnText = "Nộp bài bước này";
            if(myData.isSubmitted) {
                btnText = "Nộp bổ sung";
                
                // Khung Nhận xét (Nổi bật)
                let feedbackHtml = '';
                if(myData.feedback) {
                    feedbackHtml = `<div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4 rounded-r text-yellow-800 text-sm">
                        <p class="font-bold flex items-center gap-1 mb-1">💬 Nhận xét từ Giảng viên:</p>
                        <p class="whitespace-pre-wrap italic">"${myData.feedback}"</p>
                    </div>`;
                }

                historyHtml = `${feedbackHtml}<div class="bg-green-50 border border-green-200 p-4 rounded-lg mb-4 text-sm text-green-800"><p class="font-bold flex items-center gap-1 mb-2">✅ Đã ghi nhận bài làm</p><ul class="list-disc pl-5 mt-1 text-blue-600 underline">${myData.uploadedUrls.map((url, i) => `<li><a href="${url.replace('file/d/', 'uc?id=').replace('/view?usp=drivesdk', '')}" target="_blank">Xem ảnh minh chứng đã nộp (${i+1})</a></li>`).join('')}</ul></div>`;
            }

            // --- KHUNG UPLOAD MỚI NHẤT (Có hướng dẫn Dán ảnh) ---
            html += `<div class="mt-8 border-t border-gray-200 pt-8">
                ${historyHtml}
                <p class="text-gray-800 font-medium mb-2">📸 Minh chứng thực hành <span class="text-red-500">* (Bắt buộc)</span></p>
                <p class="text-gray-500 text-[13px] mb-4">${ex.confirm ? ex.confirm : 'Bạn cần nộp ảnh để hoàn thành bài này.'}</p>
                
                <div id="uploadArea" class="flex flex-col bg-gray-50 p-5 border border-dashed border-gray-300 rounded-lg transition">
                    
                    <div class="flex flex-col md:flex-row items-start md:items-center gap-4 w-full">
                        <!-- Nút Chọn File ảo -->
                        <div class="relative w-full md:w-auto shrink-0">
                            <button class="w-full flex justify-center items-center gap-2 px-4 py-2.5 bg-white border border-gray-300 hover:bg-gray-100 rounded text-sm text-gray-700 font-medium shadow-sm transition">
                                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                Bấm Chọn ảnh
                            </button>
                            <input type="file" multiple accept="image/*" onchange="handleFileSelect(event)" class="absolute left-0 top-0 w-full h-full opacity-0 cursor-pointer">
                        </div>
                        
                        <p class="text-sm text-gray-500 italic hidden md:block">...hoặc ấn <strong>Ctrl + V</strong> để dán ảnh vào đây.</p>

                        <!-- Nút Nộp Bài (Đẩy sang phải) -->
                        <button id="btnSubmitStep_${index}" onclick="uploadToGAS(${index}, '${ex.title}')" class="w-full md:w-auto ml-auto bg-[#1a73e8] text-white px-8 py-2.5 rounded hover:bg-blue-700 transition shadow font-bold flex items-center justify-center gap-2 shrink-0">
                            <span id="btnSubmitText_${index}">${btnText}</span>
                        </button>
                    </div>

                    <!-- Khu vực hiển thị Tag ảnh được chọn/dán -->
                    <div id="fileTags" class="mt-4 flex flex-wrap gap-2 empty:hidden"></div>
                </div>
            </div>`;

            contentDiv.innerHTML = html; updateBottomNav(); document.querySelector('main').scrollTo(0, 0); localStorage.setItem(STORAGE_KEY, currentStepIndex);
        }

        // HÀM XỬ LÝ LƯU FILE VÀO MẢNG & HIỂN THỊ TAG
        function handleFileSelect(event) {
            const files = event.target.files;
            if(files.length === 0) return;
            
            for(let i=0; i<files.length; i++) {
                pendingFiles.push(files[i]);
            }
            renderFileTags();
            // Reset input để chọn lại đúng file đó vẫn nhận
            event.target.value = '';
        }

        function renderFileTags() {
            const tagContainer = document.getElementById(`fileTags`);
            if(!tagContainer) return;
            let html = '';
            for(let i=0; i<pendingFiles.length; i++) {
                let fileName = pendingFiles[i].name;
                if(fileName.length > 25) fileName = fileName.substring(0, 20) + '...';
                html += `<span class="bg-blue-100 text-blue-800 border border-blue-200 text-xs font-semibold px-3 py-1.5 rounded-full flex items-center gap-1 shadow-sm">
                            🖼️ ${fileName} 
                            <button onclick="removeFile(${i})" class="ml-1 hover:text-red-500 font-bold ml-2">×</button>
                         </span>`;
            }
            tagContainer.innerHTML = html;
        }

        function removeFile(index) {
            pendingFiles.splice(index, 1);
            renderFileTags();
        }

        function saveDraft() {
            const index = currentStepIndex; const textEl = document.getElementById(`inpTextAnswer_${index}`);
            if(!stepDataStore[index]) stepDataStore[index] = { text: "", uploadedUrls: [], isSubmitted: false, feedback: "" };
            if(textEl) { stepDataStore[index].text = textEl.value; localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore)); }
        }

        // THUẬT TOÁN NÉN ẢNH SIÊU NHANH
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image(); img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1200; // Resize xuống 1200px cho nhẹ server
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                        resolve({ mimeType: 'image/jpeg', base64Data: compressedBase64 });
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        function uploadToGAS(index, exerciseTitle) {
            saveDraft(); 
            const currentData = stepDataStore[index];
            
            // CHECK BẮT BUỘC PHẢI CÓ ẢNH
            if (pendingFiles.length === 0 && (!currentData.uploadedUrls || currentData.uploadedUrls.length === 0)) {
                alert("❌ LỖI: Bài làm bắt buộc phải có ảnh minh chứng. Vui lòng chọn ảnh hoặc dán ảnh vào khung."); return;
            }
            if (pendingFiles.length === 0 && currentData.uploadedUrls.length > 0) {
                alert("💡 Bạn chưa thêm ảnh mới nào cả. Khung chữ tự luận tự động được lưu nháp."); return;
            }

            const apiUrl = APP_CONFIG.API_URL; const courseName = APP_CONFIG.COURSE_NAME;
            if (!apiUrl) { alert("Lỗi Admin: Chưa cấu hình API URL!"); return; }
            const profileRaw = localStorage.getItem('kv_trainer_profile');
            if (!profileRaw) { window.location.href = 'index.html'; return; }
            const profile = JSON.parse(profileRaw);

            const btnEl = document.getElementById(`btnSubmitStep_${index}`);
            const txtEl = document.getElementById(`btnSubmitText_${index}`);
            const oldText = txtEl.innerText;
            
            btnEl.classList.replace('bg-[#1a73e8]', 'bg-gray-400');
            btnEl.classList.add('cursor-not-allowed', 'animate-pulse');
            txtEl.innerText = `Đang xử lý ${pendingFiles.length} ảnh...`;
            btnEl.disabled = true;

            // Nén song song toàn bộ ảnh
            let promises = [];
            for(let i = 0; i < pendingFiles.length; i++) {
                promises.push(compressImage(pendingFiles[i]));
            }

            Promise.all(promises).then(imagesData => {
                const payload = {
                    studentName: profile.name, department: profile.dept, courseName: courseName,
                    session: document.getElementById('sessionTitle').innerText, exerciseTitle: exerciseTitle,
                    textAnswer: currentData.text, images: imagesData
                };
                return fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
            }).then(r => r.json()).then(data => {
                if(data.status === 'success') {
                    currentData.isSubmitted = true;
                    if(data.urls) currentData.uploadedUrls = [...new Set([...currentData.uploadedUrls, ...data.urls])];
                    localStorage.setItem(DATA_KEY, JSON.stringify(stepDataStore));
                    pendingFiles = []; // Xóa trắng file tạm
                    alert("🎉 Đã nộp bài thành công!"); goToStep(index); renderSidebar(); 
                } else alert("Lỗi server: " + data.message);
            }).catch(err => alert("Lỗi kết nối mạng: Vui lòng thử lại sau."))
            .finally(() => {
                btnEl.classList.replace('bg-gray-400', 'bg-[#1a73e8]');
                btnEl.classList.remove('cursor-not-allowed', 'animate-pulse');
                txtEl.innerText = oldText; btnEl.disabled = false;
            });
        }

        function updateBottomNav() {
            const btnNext = document.getElementById('btnNext');
            let prevIndex = currentStepIndex - 1; while(prevIndex >= 0 && currentExercises[prevIndex].isGroupHeader) prevIndex--;
            document.getElementById('btnPrev').disabled = (prevIndex < 0);
            
            let totalRealExercises = 0; let completedCount = 0;
            for(let i=0; i<currentExercises.length; i++) {
                if(!currentExercises[i].isGroupHeader) {
                    totalRealExercises++; if(stepDataStore[i] && stepDataStore[i].isSubmitted) completedCount++;
                }
            }
            const percent = totalRealExercises === 0 ? 0 : Math.round((completedCount / totalRealExercises) * 100);

            let isLastStep = true;
            for(let i = currentStepIndex + 1; i < currentExercises.length; i++) { if(!currentExercises[i].isGroupHeader) { isLastStep = false; break; } }
            if(isLastStep) { btnNext.innerHTML = 'Kết thúc buổi học'; btnNext.classList.replace('bg-[#1a73e8]', 'bg-green-600'); } 
            else { btnNext.innerHTML = 'Tiếp ❯'; btnNext.classList.replace('bg-green-600', 'bg-[#1a73e8]'); }
            
            document.getElementById('progressBar').style.width = percent + '%'; document.getElementById('timeRemaining').innerText = `Tiến độ: ${percent}%`;
        }

        function nextStep() {
            saveDraft();
            let totalRealExercises = 0; let completedCount = 0;
            for(let i=0; i<currentExercises.length; i++) { if(!currentExercises[i].isGroupHeader) { totalRealExercises++; if(stepDataStore[i] && stepDataStore[i].isSubmitted) completedCount++; } }
            const percent = totalRealExercises === 0 ? 0 : Math.round((completedCount / totalRealExercises) * 100);
            let nextIndex = currentStepIndex + 1; while(nextIndex < currentExercises.length && currentExercises[nextIndex].isGroupHeader) nextIndex++;

            if(nextIndex < currentExercises.length) { goToStep(nextIndex); } 
            else {
                if(percent < 100) alert(`Bạn mới hoàn thành ${percent}%.\nVui lòng làm đủ các bài chưa có dấu (✓) và nộp ẢNH MINH CHỨNG trước khi Kết thúc.`);
                else {
                    const profile = JSON.parse(localStorage.getItem('kv_trainer_profile'));
                    document.getElementById('certName').innerText = profile.name; document.getElementById('certDept').innerText = profile.dept;
                    document.getElementById('certSession').innerText = document.getElementById('sessionTitle').innerText;
                    const now = new Date();
                    document.getElementById('certTime').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + " ngày " + now.getDate() + "/" + (now.getMonth()+1) + "/" + now.getFullYear();
                    document.getElementById('certificateModal').classList.remove('hidden');
                }
            }
        }

        function prevStep() { saveDraft(); let prevIndex = currentStepIndex - 1; while(prevIndex >= 0 && currentExercises[prevIndex].isGroupHeader) prevIndex--; if(prevIndex >= 0) goToStep(prevIndex); }

        function generatePDF() {
            const pdfContent = document.getElementById('pdf-content');
            const profile = JSON.parse(localStorage.getItem('kv_trainer_profile'));
            const sessionName = document.getElementById('sessionTitle').innerText;

            let reportHtml = `<div style="font-family: Arial, sans-serif; color: #333; max-width: 800px; margin: 0 auto;">`;
            reportHtml += `<h1 style="font-size: 24px; font-weight: bold; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-bottom: 20px;">Báo cáo bài tập - ${sessionName}</h1>`;
            reportHtml += `<div style="background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 30px;">
                            <p style="margin: 0 0 8px 0; font-size: 16px;"><strong>Học viên:</strong> ${profile.name} - ${profile.dept}</p>
                            <p style="margin: 0; font-size: 16px;"><strong>Khóa học:</strong> ${APP_CONFIG.COURSE_NAME}</p></div>`;

            for(let i=0; i<currentExercises.length; i++) {
                if(currentExercises[i].isGroupHeader) continue;
                const ex = currentExercises[i]; const data = stepDataStore[i] || {};
                
                reportHtml += `<div class="print-page-break">`;
                reportHtml += `<h2 style="font-size: 18px; font-weight: bold; color: #1a73e8; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px;">${ex.title}</h2>`;
                
                if(ex.theory && ex.theory.length > 0) reportHtml += `<p style="font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #555;">Câu hỏi:</p><div style="font-size: 13px; margin-bottom: 10px; color: #444;">${ex.theory.map(t => `<p style="margin:2px 0;">${t}</p>`).join('')}</div>`;
                if(data.text && data.text.trim() !== '') reportHtml += `<p style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">Câu trả lời tự luận:</p><div style="background: #e8f0fe; border-left: 3px solid #1a73e8; padding: 10px; margin-bottom: 15px; white-space: pre-wrap; font-size: 14px;">${data.text}</div>`;
                if(ex.requirements && ex.requirements.length > 0) reportHtml += `<p style="font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #e67c73;">Yêu cầu thực hành:</p><ul style="font-size: 13px; margin-bottom: 10px; color: #444; padding-left: 20px;">${ex.requirements.map(r => `<li style="margin:2px 0;">${r}</li>`).join('')}</ul>`;
                
                if(data.uploadedUrls && data.uploadedUrls.length > 0) {
                    reportHtml += `<p style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">Ảnh minh chứng:</p><div style="display: flex; flex-direction: column; gap: 15px;">`;
                    data.uploadedUrls.forEach(url => {
                        let directUrl = url; let fileIdMatch = url.match(/\/d\/(.+?)\//);
                        if(fileIdMatch && fileIdMatch[1]) directUrl = `https://lh3.googleusercontent.com/d/${fileIdMatch[1]}`;
                        reportHtml += `<div style="text-align: center;"><img src="${directUrl}" style="border: 1px solid #ccc; border-radius: 4px;"></div>`;
                    });
                    reportHtml += `</div>`;
                } else reportHtml += `<p style="color: #d93025; font-style: italic;">Chưa nộp bài</p>`;
                reportHtml += `</div><br>`;
            }
            
            pdfContent.innerHTML = reportHtml + `</div>`;
            document.getElementById('certificateModal').classList.add('hidden');
            setTimeout(() => { window.print(); document.getElementById('certificateModal').classList.remove('hidden'); }, 500);
        }
    </script>
</body>
</html>
