<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm điểm L&D | Trainer OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="data.js"></script> <!-- Load JSON Data -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f6fa; }
        .kv-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid #edf2f7; }
        .kv-input { border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.75rem; width: 100%; transition: all 0.2s; outline: none; }
        .kv-input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .tab-active { border-bottom: 2px solid #007aff; color: #007aff; font-weight: 600; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #0f172a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center z-10 shrink-0 sticky top-0 shadow-sm">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-blue-600 transition-colors"><i class="fas fa-arrow-left text-xl"></i></a>
            <div>
                <h1 class="text-xl font-bold text-gray-900" id="pageTitle">Đang tải biểu mẫu...</h1>
            </div>
        </div>
        <div>
            <button onclick="saveDraft()" class="bg-white border border-blue-200 text-blue-600 font-semibold px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors shadow-sm">
                Lưu tạm tiến độ
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        
        <!-- Chọn học viên đang học -->
        <div class="max-w-5xl mx-auto mb-6 kv-card p-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="text-sm">
                <span class="font-semibold text-gray-700">Đang thực hiện:</span> Chọn học viên cũ để tiếp tục hoặc tạo mới.
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="draftSelector" class="kv-input py-2 text-sm md:w-64" onchange="loadDraft(this.value)">
                    <option value="">-- Chọn hồ sơ đang đánh giá --</option>
                </select>
                <button onclick="createNewRecord()" class="bg-blue-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-blue-700 whitespace-nowrap text-sm">
                    <i class="fas fa-plus mr-1"></i> Form Mới
                </button>
            </div>
        </div>

        <form id="reviewForm" class="kv-card max-w-5xl mx-auto mb-10 overflow-hidden">
            <input type="hidden" name="id" id="record_id">
            <input type="hidden" name="status" id="record_status" value="Đang học">
            <!-- Thêm thông tin Phòng ban & Khóa để cho Quản lý lọc -->
            <input type="hidden" name="course_type" id="course_type" value="Sản phẩm"> 
            
            <div class="flex border-b bg-gray-50/50 overflow-x-auto">
                <button type="button" class="tab-btn tab-active py-4 px-6 text-sm whitespace-nowrap outline-none" data-target="tab1">1. Thông tin chung</button>
                <button type="button" class="tab-btn tab-inactive py-4 px-6 text-sm whitespace-nowrap outline-none" data-target="tab2">2. Retail Ngày 1</button>
                <button type="button" class="tab-btn tab-inactive py-4 px-6 text-sm whitespace-nowrap outline-none" data-target="tab3">3. Retail Ngày 2</button>
                <button type="button" class="tab-btn tab-inactive py-4 px-6 text-sm whitespace-nowrap outline-none" data-target="tab4">4. Kết Luận</button>
            </div>

            <div class="p-6 md:p-8">
                <!-- TAB 1 -->
                <div id="tab1" class="tab-content active space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Họ tên nhân sự <span class="text-red-500">*</span></label>
                            <input type="text" name="trainee_name" class="kv-input" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Phòng ban (Team) <span class="text-red-500">*</span></label>
                            <select name="department" class="kv-input" required>
                                <option value="">-- Chọn phòng ban --</option>
                                <option value="Hà Nội 1">Hà Nội 1</option>
                                <option value="Hà Nội 2">Hà Nội 2</option>
                                <option value="HCM 1">HCM 1</option>
                                <option value="HCM 2">HCM 2</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Ngày bắt đầu Review</label>
                            <input type="date" name="review_date" class="kv-input" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Điểm tự tin (1-10)</label>
                            <select name="self_confidence_score" class="kv-input">
                                <option value="">Chọn mức độ...</option>
                                <option value="1-3">1-3 Điểm (Rất yếu)</option>
                                <option value="4-6">4-6 Điểm (Trung bình)</option>
                                <option value="7-8">7-8 Điểm (Khá tự tin)</option>
                                <option value="9-10">9-10 Điểm (Rất tự tin)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- TAB 2: Ngày 1 -->
                <div id="tab2" class="tab-content space-y-6">
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg">
                        <h4 class="font-bold text-blue-800 mb-2">Gợi ý tình huống Sáng Ngày 1 (Hàng hóa)</h4>
                        <ul class="text-sm text-blue-900 space-y-1 pl-4 list-disc" id="hint_day1_morning">
                            <!-- Đổ từ JS -->
                        </ul>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2 text-sm">Ghi chú & Đánh giá (Sáng Ngày 1)</label>
                        <textarea name="day1_morning_note" rows="3" class="kv-input mb-3" placeholder="Ghi nhận xét..."></textarea>
                        <div class="flex gap-4 text-sm">
                            <label><input type="radio" name="day1_morning_score" value="Chưa đạt"> Chưa đạt</label>
                            <label><input type="radio" name="day1_morning_score" value="Đạt thao tác"> Đạt thao tác</label>
                            <label><input type="radio" name="day1_morning_score" value="Đạt ứng dụng"> Đạt ứng dụng</label>
                            <label><input type="radio" name="day1_morning_score" value="Tốt"> Tốt</label>
                        </div>
                    </div>

                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg mt-6">
                        <h4 class="font-bold text-blue-800 mb-2">Gợi ý tình huống Chiều Ngày 1 (Nhập, Giá, Kho)</h4>
                        <ul class="text-sm text-blue-900 space-y-1 pl-4 list-disc" id="hint_day1_afternoon"></ul>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2 text-sm">Ghi chú & Đánh giá (Chiều Ngày 1)</label>
                        <textarea name="day1_afternoon_note" rows="3" class="kv-input mb-3"></textarea>
                        <div class="flex gap-4 text-sm">
                            <label><input type="radio" name="day1_afternoon_score" value="Chưa đạt"> Chưa đạt</label>
                            <label><input type="radio" name="day1_afternoon_score" value="Đạt thao tác"> Đạt thao tác</label>
                            <label><input type="radio" name="day1_afternoon_score" value="Đạt ứng dụng"> Đạt ứng dụng</label>
                            <label><input type="radio" name="day1_afternoon_score" value="Tốt"> Tốt</label>
                        </div>
                    </div>
                </div>

                <!-- TAB 3: Ngày 2 -->
                <div id="tab3" class="tab-content space-y-6">
                     <div class="bg-teal-50 border border-teal-100 p-4 rounded-lg">
                        <h4 class="font-bold text-teal-800 mb-2">Gợi ý tình huống Sáng Ngày 2 (Bán hàng, KH)</h4>
                        <ul class="text-sm text-teal-900 space-y-1 pl-4 list-disc" id="hint_day2_morning"></ul>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2 text-sm">Ghi chú & Đánh giá (Sáng Ngày 2)</label>
                        <textarea name="day2_morning_note" rows="3" class="kv-input mb-3"></textarea>
                        <div class="flex gap-4 text-sm">
                            <label><input type="radio" name="day2_morning_score" value="Chưa đạt"> Chưa đạt</label>
                            <label><input type="radio" name="day2_morning_score" value="Đạt thao tác"> Đạt thao tác</label>
                            <label><input type="radio" name="day2_morning_score" value="Đạt ứng dụng"> Đạt ứng dụng</label>
                            <label><input type="radio" name="day2_morning_score" value="Tốt"> Tốt</label>
                        </div>
                    </div>

                    <div class="bg-teal-50 border border-teal-100 p-4 rounded-lg mt-6">
                        <h4 class="font-bold text-teal-800 mb-2">Gợi ý tình huống Chiều Ngày 2 (Báo cáo, Mở rộng)</h4>
                        <ul class="text-sm text-teal-900 space-y-1 pl-4 list-disc" id="hint_day2_afternoon"></ul>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2 text-sm">Ghi chú & Đánh giá (Chiều Ngày 2)</label>
                        <textarea name="day2_afternoon_note" rows="3" class="kv-input mb-3"></textarea>
                        <div class="flex gap-4 text-sm">
                            <label><input type="radio" name="day2_afternoon_score" value="Chưa đạt"> Chưa đạt</label>
                            <label><input type="radio" name="day2_afternoon_score" value="Đạt thao tác"> Đạt thao tác</label>
                            <label><input type="radio" name="day2_afternoon_score" value="Đạt ứng dụng"> Đạt ứng dụng</label>
                            <label><input type="radio" name="day2_afternoon_score" value="Tốt"> Tốt</label>
                        </div>
                    </div>
                </div>

                <!-- TAB 4: Kết luận -->
                <div id="tab4" class="tab-content space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Điểm mạnh / Tâm lý</label>
                            <textarea name="final_strengths" rows="3" class="kv-input"></textarea>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2 text-sm">Điểm yếu cần khắc phục</label>
                            <textarea name="final_weaknesses" rows="3" class="kv-input"></textarea>
                        </div>
                    </div>
                    
                    <div class="bg-gray-50 border border-gray-200 p-6 rounded-xl mt-6 text-center">
                        <label class="block text-gray-900 font-bold mb-3 text-lg">Xếp Loại Chung Của L&D <span class="text-red-500">*</span></label>
                        <select name="final_status" id="final_status_select" class="kv-input max-w-sm mx-auto text-center font-bold text-blue-700">
                            <option value="">-- CHỌN KẾT QUẢ --</option>
                            <option value="Chưa đạt">Chưa đạt (Học lại)</option>
                            <option value="Đạt thao tác">Đạt thao tác (Coaching thêm)</option>
                            <option value="Đạt ứng dụng">Đạt ứng dụng (Pass)</option>
                            <option value="Tốt">Tốt (Pass xuất sắc)</option>
                        </select>
                        <button type="button" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full mt-6 hover:bg-blue-700 transition-colors w-full md:w-auto" onclick="submitFinal()">
                            Hoàn Thành Đánh Giá
                        </button>
                    </div>
                </div>
            </div>
            
        </form>
    </main>

    <script>
        // Init Load from URL params & Data.js
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'product';
            
            if(type === 'product' && reviewCriteria.product_w1) {
                const data = reviewCriteria.product_w1;
                document.getElementById('pageTitle').innerText = data.title;
                document.getElementById('course_type').value = "Tuần 1 - Sản Phẩm";
                
                // Đổ text tình huống vào HTML
                document.getElementById('hint_day1_morning').innerHTML = data.day1_morning.scenarios.map(s => `<li>${s}</li>`).join('');
                document.getElementById('hint_day1_afternoon').innerHTML = data.day1_afternoon.scenarios.map(s => `<li>${s}</li>`).join('');
                document.getElementById('hint_day2_morning').innerHTML = data.day2_morning.scenarios.map(s => `<li>${s}</li>`).join('');
                document.getElementById('hint_day2_afternoon').innerHTML = data.day2_afternoon.scenarios.map(s => `<li>${s}</li>`).join('');
            }
            
            loadDraftList();
            if(!document.getElementById('record_id').value) createNewRecord();
        });

        // Tab Logic
        const tabs = Array.from(document.querySelectorAll('.tab-btn'));
        const contents = document.querySelectorAll('.tab-content');
        function switchTab(index) {
            tabs.forEach((tab, i) => tab.className = i === index ? "tab-btn tab-active py-4 px-6 text-sm whitespace-nowrap outline-none" : "tab-btn tab-inactive py-4 px-6 text-sm whitespace-nowrap outline-none");
            contents.forEach((c, i) => c.classList.toggle('active', i === index));
        }
        tabs.forEach((tab, i) => tab.addEventListener('click', () => switchTab(i)));

        // Data Logic
        const DB_KEY = 'trainer_os_reviews';

        function loadDraftList() {
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const select = document.getElementById('draftSelector');
            select.innerHTML = '<option value="">-- Chọn hồ sơ đang đánh giá --</option>';
            data.filter(d => d.status === 'Đang học').forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id; opt.textContent = `${d.trainee_name} (${d.department})`;
                select.appendChild(opt);
            });
        }

        function createNewRecord() {
            document.getElementById('reviewForm').reset();
            document.getElementById('record_id').value = 'TR_' + Date.now();
            document.getElementById('record_status').value = 'Đang học';
            document.getElementById('draftSelector').value = "";
            switchTab(0);
        }

        function loadDraft(id) {
            if(!id) return;
            const data = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const record = data.find(d => d.id === id);
            if(record) {
                const form = document.getElementById('reviewForm');
                Object.keys(record).forEach(key => {
                    const elements = form.elements[key];
                    if(elements) {
                        if(elements.length && elements[0].type === 'radio') Array.from(elements).forEach(el => el.checked = (el.value === record[key]));
                        else elements.value = record[key];
                    }
                });
            }
        }

        function saveDraft() {
            const form = document.getElementById('reviewForm');
            if(!form.trainee_name.value) { alert("Nhập Tên học viên ở Tab 1 trước!"); return; }
            if(!document.getElementById('record_id').value) document.getElementById('record_id').value = 'TR_' + Date.now();
            document.getElementById('record_status').value = 'Đang học';
            saveToDB();
            alert("Đã lưu nháp tiến độ!");
            loadDraftList();
            document.getElementById('draftSelector').value = document.getElementById('record_id').value;
        }

        function submitFinal() {
            const form = document.getElementById('reviewForm');
            if(!form.trainee_name.value || !document.getElementById('final_status_select').value) {
                alert("Vui lòng điền Tên học viên và Xếp Loại Chung trước khi hoàn thành!"); return;
            }
            document.getElementById('record_status').value = 'Hoàn thành';
            saveToDB();
            alert("Đã chốt kết quả chuyển cho Quản lý!");
            createNewRecord();
            loadDraftList();
        }

        function saveToDB() {
            const form = document.getElementById('reviewForm');
            const payload = Object.fromEntries(new FormData(form).entries());
            payload.last_updated = new Date().toLocaleString('vi-VN');
            let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];
            const existingIndex = db.findIndex(d => d.id === payload.id);
            if(existingIndex >= 0) db[existingIndex] = payload;
            else db.unshift(payload);
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }
    </script>
</body>
</html>
