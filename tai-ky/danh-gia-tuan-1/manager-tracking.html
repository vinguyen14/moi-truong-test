<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Quản lý | Trainer OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SheetJS để xuất Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f6fa; }
        .kv-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); border: 1px solid #edf2f7; }
        .kv-input { border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.875rem; outline: none; }
        .kv-input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800">

    <header class="bg-white border-b px-6 py-4 flex justify-between items-center z-10 shrink-0 sticky top-0 shadow-sm">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-teal-600 transition-colors"><i class="fas fa-arrow-left text-xl"></i></a>
            <div>
                <h1 class="text-xl font-bold text-gray-900">Manager Tracking</h1>
                <p class="text-xs text-gray-500 mt-1">Báo cáo đánh giá Tái Ký</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportToExcel()" class="bg-green-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-green-700 transition-colors text-sm flex items-center">
                <i class="fas fa-file-excel mr-2"></i> Xuất Excel
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <!-- Filters -->
            <div class="kv-card p-4 flex flex-wrap gap-4 items-end bg-white">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Tên nhân viên</label>
                    <input type="text" id="f_name" class="kv-input w-48" placeholder="Tìm tên..." oninput="filterTable()">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Phòng ban</label>
                    <select id="f_dept" class="kv-input w-40" onchange="filterTable()">
                        <option value="">Tất cả</option>
                        <option value="Hà Nội 1">Hà Nội 1</option>
                        <option value="Hà Nội 2">Hà Nội 2</option>
                        <option value="HCM 1">HCM 1</option>
                        <option value="HCM 2">HCM 2</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Khóa học</label>
                    <select id="f_course" class="kv-input w-40" onchange="filterTable()">
                        <option value="">Tất cả</option>
                        <option value="Sản Phẩm">Tuần 1 - Sản Phẩm</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Trạng thái</label>
                    <select id="f_status" class="kv-input w-40" onchange="filterTable()">
                        <option value="">Tất cả</option>
                        <option value="Đang học">Đang học</option>
                        <option value="Hoàn thành">Hoàn thành</option>
                    </select>
                </div>
            </div>

            <div class="kv-card overflow-hidden">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 font-semibold border-b">
                            <th class="p-4">Họ & Tên</th>
                            <th class="p-4">Phòng ban</th>
                            <th class="p-4">Khóa học</th>
                            <th class="p-4">Trạng thái</th>
                            <th class="p-4">Xếp loại</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        <!-- JS Fill -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentData = [];

        function loadData() {
            const dataStr = localStorage.getItem('trainer_os_reviews');
            if(dataStr) {
                currentData = JSON.parse(dataStr);
                renderTable(currentData);
            }
        }

        function filterTable() {
            const name = document.getElementById('f_name').value.toLowerCase();
            const dept = document.getElementById('f_dept').value;
            const course = document.getElementById('f_course').value;
            const status = document.getElementById('f_status').value;

            const filtered = currentData.filter(d => {
                const matchName = (d.trainee_name || '').toLowerCase().includes(name);
                const matchDept = dept === "" || d.department === dept;
                const matchCourse = course === "" || (d.course_type && d.course_type.includes(course));
                const matchStatus = status === "" || d.status === status;
                return matchName && matchDept && matchCourse && matchStatus;
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                let statusHtml = row.status === 'Đang học' 
                    ? `<span class="bg-blue-50 text-blue-600 border border-blue-200 px-2 py-1 rounded text-xs">Đang Đánh Giá</span>`
                    : `<span class="bg-green-50 text-green-600 border border-green-200 px-2 py-1 rounded text-xs">Hoàn thành</span>`;
                
                let resultHtml = row.final_status ? `<span class="font-semibold text-gray-800">${row.final_status}</span>` : `<span class="text-gray-400">-</span>`;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-semibold text-blue-700">${row.trainee_name || 'N/A'}</td>
                        <td class="p-4 text-gray-600">${row.department || '-'}</td>
                        <td class="p-4 text-gray-600">${row.course_type || 'Tuần 1'}</td>
                        <td class="p-4">${statusHtml}</td>
                        <td class="p-4">${resultHtml}</td>
                    </tr>
                `;
            });
        }

        function exportToExcel() {
            if(currentData.length === 0) { alert("Không có dữ liệu để xuất!"); return; }
            
            // Format data for Excel
            const excelData = currentData.map(d => ({
                "Họ Tên": d.trainee_name,
                "Phòng Ban": d.department,
                "Khóa Đánh Giá": d.course_type,
                "Ngày Bắt Đầu": d.review_date,
                "Trạng Thái": d.status,
                "Điểm Tự Tin": d.self_confidence_score,
                "Điểm Mạnh": d.final_strengths,
                "Điểm Yếu": d.final_weaknesses,
                "Xếp Loại L&D": d.final_status
            }));

            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "BaoCao_LND");
            XLSX.writeFile(wb, "Bao_Cao_Nhan_Su_Tai_Ky.xlsx");
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
