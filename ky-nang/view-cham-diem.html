<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiotViet L&D - Quản Lý Chấm Điểm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- CẤU HÌNH GẮN CỨNG LINK TẠI ĐÂY -->
    <script>
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxVvXTNrnUcWHSOkp2pTuHd-AQZru4ms23XylfGQPCeSUrno2MPncFNqd6Tt6KwpB-CYg/exec", 
            SHEET_URL: "https://docs.google.com/spreadsheets/d/161DKBTiYh6CXBy7AGRx6qCjIHcdBD7cZQ_CSOrK1CtY/edit?gid=0#gid=0"
        };
    </script>

    <!-- SIDEBAR -->
    <aside class="w-72 bg-slate-900 text-white flex flex-col shadow-xl z-20 shrink-0">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-xl shadow-lg"><i class="fas fa-graduation-cap"></i></div>
            <div>
                <h1 class="font-black text-lg leading-tight tracking-tight">KiotViet L&D</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Portal Giảng Viên</p>
            </div>
        </div>
        <div class="p-4 flex-1">
            <button onclick="loadSubmissions()" id="btnRefresh" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition shadow-md mb-4">
                <i class="fas fa-sync-alt"></i> Tải dữ liệu bài làm
            </button>
            <a href="#" onclick="window.open(CONFIG.SHEET_URL, '_blank')" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition border border-slate-700">
                <i class="fas fa-table text-emerald-400"></i> Mở Database Sheet
            </a>
            
            <div class="mt-8 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Thống kê hiển thị</p>
                <div class="flex justify-between items-center text-sm font-medium text-slate-300 mb-2"><span>Tổng số bài nộp:</span><span id="statTotal" class="font-black text-white">0</span></div>
                <div class="flex justify-between items-center text-sm font-medium text-slate-300"><span>Chờ chấm điểm:</span><span id="statPending" class="font-black text-amber-400">0</span></div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen relative overflow-hidden bg-slate-50">
        <header class="bg-white h-16 border-b border-slate-200 px-8 flex items-center justify-between shrink-0 shadow-sm z-10">
            <h2 class="font-black text-slate-800 text-lg">Danh Sách Kịch Bản</h2>
            <div class="text-sm font-bold text-slate-500 bg-slate-100 px-4 py-2 rounded-lg"><i class="fas fa-shield-alt text-indigo-500 mr-1"></i> Quyền Quản trị viên</div>
        </header>

        <div id="loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
            <i class="fas fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
            <p class="font-bold text-slate-600 text-lg">Đang kết nối hệ thống...</p>
        </div>

        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="submissionsList" class="max-w-5xl mx-auto space-y-6 pb-20">
                <div class="text-center py-20 bg-white rounded-3xl border border-slate-200 border-dashed shadow-sm">
                    <i class="fas fa-inbox text-6xl text-slate-200 mb-4"></i>
                    <p class="text-slate-500 font-bold">Hãy bấm "Tải dữ liệu bài làm" ở menu bên trái.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allData = [];

        function loadSubmissions() {
            if(!CONFIG.API_URL || CONFIG.API_URL === "DÁN_LINK_API_CỦA_BẠN_VÀO_ĐÂY") { alert("Vui lòng gắn Link API vào biến CONFIG trong file HTML trước."); return; }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('submissionsList').innerHTML = '';
            document.getElementById('btnRefresh').disabled = true;

            fetch(CONFIG.API_URL + '?action=get_all_submissions')
            .then(r => r.json()).then(res => {
                if(res.status === 'success') { allData = res.data; renderList(allData); } 
                else alert("Lỗi tải dữ liệu!");
            }).catch(err => alert("Lỗi kết nối!")).finally(() => { 
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btnRefresh').disabled = false;
            });
        }

        function renderList(data) {
            const container = document.getElementById('submissionsList');
            if(data.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 font-bold py-10">Chưa có bài nào được nộp.</p>`; return; }

            let pendingCount = 0;
            container.innerHTML = '';

            data.forEach((item, index) => {
                let isGraded = item.feedback && item.feedback.trim() !== "";
                let isUpdate = item.exerciseTitle.includes("[BẢN BỔ SUNG]");
                if(!isGraded) pendingCount++;
                
                let gradeBadge = isGraded ? `<span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-[11px] font-black border border-emerald-200"><i class="fas fa-check"></i> Đã chấm</span>` : `<span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-[11px] font-black border border-amber-200 animate-pulse"><i class="fas fa-exclamation-circle"></i> Chờ chấm</span>`;
                let updateBadge = isUpdate ? `<span class="bg-red-50 text-red-600 border border-red-200 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider"><i class="fas fa-history"></i> Bổ sung sửa lại</span>` : `<span class="bg-slate-100 text-slate-500 border border-slate-200 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider">Nộp lần 1</span>`;

                let html = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                    <!-- HEADER THẺ BÀI TẬP -->
                    <div class="bg-white p-5 flex justify-between items-center cursor-pointer hover:bg-slate-50" onclick="document.getElementById('body_${index}').classList.toggle('hidden')">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center text-xl font-black border border-indigo-100"><i class="fas fa-user-edit"></i></div>
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <h3 class="text-lg font-black text-slate-800">${item.studentName} <span class="text-sm text-slate-500 font-semibold">(${item.department})</span></h3>
                                    ${updateBadge}
                                </div>
                                <p class="text-xs font-bold text-slate-400">Nộp lúc: ${item.timestamp} &nbsp;|&nbsp; <span class="text-indigo-600">${item.exerciseTitle}</span></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">${gradeBadge}</div>
                    </div>
                    
                    <!-- NỘI DUNG CHI TIẾT BÊN TRONG -->
                    <div id="body_${index}" class="hidden border-t border-slate-100 bg-slate-50/50">
                        <div class="p-6">
                            <!-- Nút chức năng -->
                            <div class="flex justify-end mb-6">
                                <button id="btnPdf_${index}" onclick="exportToPDFDrive(${index})" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2.5 rounded-xl text-xs font-black flex items-center gap-2 shadow-sm transition">
                                    <i class="fas fa-file-pdf text-lg"></i> Đóng gói PDF & Lưu Drive
                                </button>
                            </div>

                            <div class="grid grid-cols-1 gap-4 mb-6">
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">Bước 1: Tiếp cận</p><p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${item.ans1 || '(Trống)'}</p></div>
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">Bước 2: Xác thực</p><p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${item.ans2 || '(Trống)'}</p></div>
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">Bước 3: Khai thác</p><p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${item.ans3 || '(Trống)'}</p></div>
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">Bước 4: Tư vấn</p><p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${item.ans4 || '(Trống)'}</p></div>
                                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm"><p class="text-xs font-black text-indigo-400 mb-3 uppercase tracking-widest">Bước 5: Chốt</p><p class="text-sm text-slate-700 font-medium whitespace-pre-wrap leading-relaxed">${item.ans5 || '(Trống)'}</p></div>
                            </div>

                            ${item.links ? `<div class="mb-8"><p class="text-xs font-black text-slate-500 mb-3">TÀI LIỆU BACKUP & ẢNH TRÊN DRIVE:</p><div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-2">${item.links.split('\n').map(link => `<a href="${link}" target="_blank" class="text-sm text-blue-600 hover:text-blue-800 underline break-all font-semibold"><i class="fas fa-external-link-alt mr-1"></i> ${link}</a>`).join('')}</div></div>` : ''}

                            <!-- VÙNG CHẤM ĐIỂM -->
                            <div class="bg-amber-50 p-6 rounded-2xl border border-amber-200 shadow-sm">
                                <label class="flex items-center gap-2 text-sm font-black text-amber-800 uppercase mb-3"><i class="fas fa-edit"></i> Ghi nhận xét của Giảng Viên:</label>
                                <textarea id="fb_${index}" rows="4" class="w-full p-4 rounded-xl border border-amber-300 outline-none text-sm font-medium mb-4 focus:ring-4 focus:ring-amber-200/50 bg-white">${item.feedback || ''}</textarea>
                                <div class="flex justify-end">
                                    <button id="btnSend_${index}" onclick="sendFeedback(${index})" class="bg-amber-500 hover:bg-amber-600 text-white font-black px-8 py-3 rounded-xl shadow-lg shadow-amber-500/30 transition-all hover:-translate-y-0.5 flex items-center gap-2">
                                        <i class="fas fa-paper-plane"></i> Gửi Điểm Cho Học Viên
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statPending').innerText = pendingCount;
        }

        // ĐÓNG GÓI PDF GỌI API LÊN GOOGLE DRIVE
        function exportToPDFDrive(index) {
            const item = allData[index];
            const btn = document.getElementById(`btnPdf_${index}`);
            const oldText = btn.innerHTML;
            
            btn.innerHTML = `<i class="fas fa-spinner fa-spin text-lg"></i> Đang nén & lưu lên Drive...`; 
            btn.disabled = true; btn.classList.add('opacity-70', 'cursor-not-allowed');

            const payload = { 
                action: "export_pdf", studentName: item.studentName, department: item.department, 
                exerciseTitle: item.exerciseTitle, feedback: document.getElementById(`fb_${index}`).value,
                ans1: item.ans1, ans2: item.ans2, ans3: item.ans3, ans4: item.ans4, ans5: item.ans5
            };

            fetch(CONFIG.API_URL, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=utf-8'}, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') { 
                    alert("Thành công! File PDF đã được lưu vào thư mục của học viên trên Google Drive."); 
                    window.open(res.url, '_blank'); // Mở file PDF ra xem luôn
                } else alert("Lỗi: " + res.message);
            }).catch(err => alert("Lỗi kết nối!")).finally(() => { 
                btn.innerHTML = oldText; btn.disabled = false; btn.classList.remove('opacity-70', 'cursor-not-allowed');
            });
        }

        // GỬI NHẬN XÉT
        function sendFeedback(index) {
            const val = document.getElementById(`fb_${index}`).value;
            if(!val) { alert("Vui lòng gõ nhận xét trước khi gửi!"); return; }

            const btn = document.getElementById(`btnSend_${index}`); const oldText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Đang lưu...`; btn.disabled = true;

            const item = allData[index];
            const payload = { action: "update_feedback", studentName: item.studentName, exerciseTitle: item.exerciseTitle, feedback: val };

            fetch(CONFIG.API_URL, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=utf-8'}, body: JSON.stringify(payload) })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') { alert("Gửi nhận xét thành công!"); loadSubmissions(); } 
                else alert("Lỗi!");
            }).catch(err => alert("Lỗi kết nối!")).finally(() => { btn.innerHTML = oldText; btn.disabled = false; });
        }
    </script>
</body>
</html>
