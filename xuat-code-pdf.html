<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer OS - Slide Builder & PDF Exporter (Iframe Engine)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        'primary-hover': '#1d4ed8',
                    }
                }
            }
        }
    </script>
    <style>
        /* Class chuẩn của hệ thống Trainer OS */
        .saas-card {
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-secondary {
            background-color: #f1f5f9;
            color: #334155;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
            border: 1px solid #cbd5e1;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
        
        /* Chỉnh Iframe full khung, cho phép scroll độc lập */
        #slide-preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col">

    <!-- Top Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-primary text-white p-2 rounded shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-900">Slide Builder (Iframe Sandbox)</h1>
                <p class="text-sm text-slate-500">Trainer OS Enterprise L&D</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="renderHTML()" class="btn-secondary flex items-center gap-2" title="Ctrl + Enter để xem nhanh">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                Render Giao Diện
            </button>
            <button onclick="exportToPDF()" class="btn-primary flex items-center gap-2 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                In / Lưu PDF 16:9
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-1 p-6 flex gap-6 overflow-hidden">
        
        <!-- Cột trái: Nhập HTML -->
        <div class="w-1/3 flex flex-col gap-2 relative">
            <label for="html-input" class="font-semibold text-slate-700 flex justify-between items-center">
                Mã nguồn HTML / CSS
                <span id="save-status" class="text-xs font-normal text-emerald-600 bg-emerald-50 px-2 py-1 rounded hidden transition-all">Đã lưu nháp!</span>
            </label>
            <textarea id="html-input" class="saas-card w-full flex-1 p-4 font-mono text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent resize-none" placeholder="Dán toàn bộ mã HTML của bạn vào đây..."></textarea>
        </div>

        <!-- Cột phải: Khung xem trước (Iframe Sandbox) -->
        <div class="w-2/3 flex flex-col gap-2">
            <label class="font-semibold text-slate-700 flex justify-between items-center">
                Màn hình xem trước (Cách ly hoàn toàn)
                <span class="text-xs font-normal text-slate-500 bg-slate-200 px-2 py-1 rounded">Hỗ trợ cuộn nhiều trang</span>
            </label>
            <div class="saas-card flex-1 bg-slate-200 overflow-hidden relative">
                <!-- IFRAME ENGINE: Không lo đơ máy, không lo xung đột CSS -->
                <iframe id="slide-preview-frame" sandbox="allow-same-origin allow-scripts"></iframe>
            </div>
        </div>

    </main>

    <script>
        const LOCAL_STORAGE_KEY = 'kv_slide_builder_draft';
        const htmlInput = document.getElementById('html-input');
        const saveStatus = document.getElementById('save-status');

        // Khi vừa mở trang, load lại code cũ nếu có
        window.addEventListener('DOMContentLoaded', () => {
            const savedCode = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedCode) {
                htmlInput.value = savedCode;
                // Render ngay lập tức đoạn code vừa load
                renderHTML();
            } else {
                // Nếu chưa có gì, render màn hình hướng dẫn mặc định vào iframe
                renderDefaultInstruction();
            }
        });

        // Tự động lưu code vào LocalStorage mỗi khi gõ
        let typingTimer;
        htmlInput.addEventListener('input', () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                localStorage.setItem(LOCAL_STORAGE_KEY, htmlInput.value);
                // Hiện thông báo đã lưu
                saveStatus.classList.remove('hidden');
                setTimeout(() => saveStatus.classList.add('hidden'), 2000);
            }, 1000); // Đợi 1 giây sau khi ngừng gõ mới lưu
        });

        // Hỗ trợ phím tắt: Ctrl + Enter để Render
        htmlInput.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                renderHTML();
            }
        });

        // Hàm xử lý đẩy HTML từ Textarea vào Iframe
        function renderHTML() {
            const codeInput = htmlInput.value;
            const iframe = document.getElementById('slide-preview-frame');
            
            if (!codeInput.trim()) {
                alert("Vui lòng nhập mã HTML trước khi xem trước.");
                renderDefaultInstruction();
                return;
            }
            
            // Xóa rỗng Iframe và ghi lại nội dung mới (Sandbox Write)
            const iframeDoc = iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(codeInput);
            iframeDoc.close();
        }

        // Giao diện hướng dẫn ban đầu trong Iframe
        function renderDefaultInstruction() {
            const iframe = document.getElementById('slide-preview-frame');
            const iframeDoc = iframe.contentWindow.document;
            const instructionHTML = `
                <html lang="vi">
                <body style="font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; align-items: center; justify-content: center; background-color: #ffffff; color: #94a3b8; text-align: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" style="height: 64px; width: 64px; margin-bottom: 16px; color: #cbd5e1;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p style="font-size: 1.125rem;">Khu vực hiển thị Slide an toàn (Iframe Sandbox)</p>
                    <p style="font-size: 0.875rem; margin-top: 8px;">Dán mã code có chứa @media print vào cột trái<br>và bấm <strong>Render Giao diện</strong> (hoặc Ctrl + Enter)</p>
                </body>
                </html>
            `;
            iframeDoc.open();
            iframeDoc.write(instructionHTML);
            iframeDoc.close();
        }

        // Hàm xử lý gọi hộp thoại in chuẩn của trình duyệt từ Iframe
        function exportToPDF() {
            const iframe = document.getElementById('slide-preview-frame');
            const codeInput = htmlInput.value;
            
            if (!codeInput.trim()) {
                alert("Bạn chưa có nội dung Slide nào để xuất PDF.");
                return;
            }

            // Focus vào iframe và gọi lệnh in nội bộ
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }
    </script>
</body>
</html>
